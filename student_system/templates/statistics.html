<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计报表 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'statistics' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>统计报表</h1>
                    </div>

                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('overview')">数据概览</div>
                        <div class="tab" onclick="switchTab('students')">学生统计</div>
                        <div class="tab" onclick="switchTab('grades')">成绩统计</div>
                        <div class="tab" onclick="switchTab('ranking')">绩点排名</div>
                    </div>

                    <!-- 数据概览 -->
                    <div id="overview" class="tab-content active">
                        <div class="stats-grid" id="overviewStats">
                            <!-- 动态加载 -->
                        </div>
                    </div>

                    <!-- 学生统计 -->
                    <div id="students" class="tab-content">
                        <div class="filter-box">
                            <select id="studentGroupBy" onchange="loadStudentStats()">
                                <option value="department">按院系</option>
                                <option value="major">按专业</option>
                                <option value="class">按班级</option>
                            </select>
                        </div>
                        <div class="chart-grid">
                            <div class="chart-container">
                                <h3>学生人数分布</h3>
                                <table class="permission-table" id="studentDistTable">
                                    <thead>
                                        <tr><th>名称</th><th>学生人数</th><th>占比</th></tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                            <div class="chart-container">
                                <h3>性别比例</h3>
                                <table class="permission-table" id="genderTable">
                                    <thead>
                                        <tr><th>性别</th><th>人数</th><th>占比</th></tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 成绩统计 -->
                    <div id="grades" class="tab-content">
                        <div class="filter-box">
                            <select id="semesterFilter" onchange="loadClassGradeStats()">
                                <option value="">所有学期</option>
                            </select>
                        </div>
                        <div class="chart-container">
                            <h3>班级平均成绩对比</h3>
                            <table class="permission-table" id="classGradeTable">
                                <thead>
                                    <tr>
                                        <th>班级</th>
                                        <th>专业</th>
                                        <th>院系</th>
                                        <th>学生数</th>
                                        <th>平均分</th>
                                        <th>平均绩点</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 绩点排名 -->
                    <div id="ranking" class="tab-content">
                        <div class="filter-box">
                            <select id="rankLimit" onchange="loadGpaRanking()">
                                <option value="10">前10名</option>
                                <option value="20">前20名</option>
                                <option value="50" selected>前50名</option>
                                <option value="100">前100名</option>
                            </select>
                        </div>
                        <div class="chart-container">
                            <h3>学生绩点排名</h3>
                            <table class="permission-table" id="rankingTable">
                                <thead>
                                    <tr>
                                        <th>排名</th>
                                        <th>学号</th>
                                        <th>姓名</th>
                                        <th>班级</th>
                                        <th>专业</th>
                                        <th>平均绩点</th>
                                        <th>已修学分</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'overview') loadOverview();
            else if (tabName === 'students') loadStudentStats();
            else if (tabName === 'grades') loadClassGradeStats();
            else if (tabName === 'ranking') loadGpaRanking();
        }

        // 加载概览数据
        function loadOverview() {
            fetch('/api/statistics/dashboard')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const d = data.data;
                        const overview = d.overview;
                        const dorm = d.dormitory;
                        const payment = d.payment;

                        const totalCapacity = dorm.total_capacity || 0;
                        const totalOccupied = dorm.total_occupied || 0;
                        const dormRate = totalCapacity > 0 ? Math.round((totalOccupied / totalCapacity) * 100) : 0;

                        const totalDue = payment.total_due || 0;
                        const totalPaid = payment.total_paid || 0;
                        const paymentRate = totalDue > 0 ? Math.round((totalPaid / totalDue) * 100) : 0;

                        document.getElementById('overviewStats').innerHTML = `
                            <div class="stat-card-report">
                                <h3>学生总数</h3>
                                <div class="value">${overview.student_count}</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>教师总数</h3>
                                <div class="value">${overview.teacher_count}</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>课程总数</h3>
                                <div class="value">${overview.course_count}</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>院系总数</h3>
                                <div class="value">${overview.dept_count}</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>班级总数</h3>
                                <div class="value">${overview.class_count}</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>宿舍入住率</h3>
                                <div class="value">${dormRate}%</div>
                                <div class="sub-value">${totalOccupied}/${totalCapacity} 床位</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>缴费完成率</h3>
                                <div class="value">${paymentRate}%</div>
                                <div class="sub-value">${payment.unpaid_count || 0} 笔待缴</div>
                            </div>
                            <div class="stat-card-report">
                                <h3>本学期选课</h3>
                                <div class="value">${overview.current_enrollment_count}</div>
                            </div>
                        `;
                    }
                });
        }

        // 加载学生统计
        function loadStudentStats() {
            const groupBy = document.getElementById('studentGroupBy').value;

            fetch(`/api/statistics/students?group_by=${groupBy}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const rows = data.data;
                        const total = rows.reduce((sum, r) => sum + r.count, 0);

                        const tbody = document.querySelector('#studentDistTable tbody');
                        tbody.innerHTML = rows.map(r => {
                            const pct = total > 0 ? ((r.count / total) * 100).toFixed(1) : 0;
                            return `
                                <tr>
                                    <td>${r.name}${r.parent_name ? ' (' + r.parent_name + ')' : ''}</td>
                                    <td>${r.count}</td>
                                    <td>
                                        <div class="progress-bar">
                                            <div class="progress-fill"></div>
                                        </div>
                                        <small>${pct}%</small>
                                    </td>
                                </tr>
                            `;
                        }).join('');
                    }
                });

            // 加载性别统计
            fetch('/api/statistics/gender')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const total = data.data.total;
                        const totalCount = total.reduce((sum, t) => sum + t.count, 0);

                        const tbody = document.querySelector('#genderTable tbody');
                        tbody.innerHTML = total.map(t => {
                            const pct = totalCount > 0 ? ((t.count / totalCount) * 100).toFixed(1) : 0;
                            return `
                                <tr>
                                    <td>${t.gender || '未填写'}</td>
                                    <td>${t.count}</td>
                                    <td>
                                        <div class="progress-bar">
                                            <div class="progress-fill"></div>
                                        </div>
                                        <small>${pct}%</small>
                                    </td>
                                </tr>
                            `;
                        }).join('');
                    }
                });
        }

        // 加载学期列表
        function loadSemesters() {
            fetch('/api/semesters?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const select = document.getElementById('semesterFilter');
                        const options = data.data.map(s => `<option value="${s.semester_id}">${s.academic_year} ${s.semester_name}</option>`).join('');
                        select.innerHTML = '<option value="">所有学期</option>' + options;
                    }
                });
        }

        // 加载班级成绩统计
        function loadClassGradeStats() {
            const semesterId = document.getElementById('semesterFilter').value;
            let url = '/api/statistics/class_grades';
            if (semesterId) url += `?semester_id=${semesterId}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const tbody = document.querySelector('#classGradeTable tbody');
                        tbody.innerHTML = data.data.map(r => `
                            <tr>
                                <td>${r.class_name}</td>
                                <td>${r.major_name}</td>
                                <td>${r.dept_name}</td>
                                <td>${r.student_count}</td>
                                <td>${r.avg_score ? r.avg_score.toFixed(2) : '-'}</td>
                                <td>${r.avg_gpa ? r.avg_gpa.toFixed(2) : '-'}</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        // 加载绩点排名
        function loadGpaRanking() {
            const limit = document.getElementById('rankLimit').value;

            fetch(`/api/statistics/gpa_ranking?limit=${limit}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const tbody = document.querySelector('#rankingTable tbody');
                        tbody.innerHTML = data.data.map(r => `
                            <tr>
                                <td><strong>${r.rank}</strong></td>
                                <td>${r.student_id}</td>
                                <td>${r.name}</td>
                                <td>${r.class_name}</td>
                                <td>${r.major_name}</td>
                                <td><strong>${r.avg_gpa ? r.avg_gpa.toFixed(2) : '-'}</strong></td>
                                <td>${r.total_credits || 0}</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        // 初始化
        loadOverview();
        loadSemesters();
    </script>

    <script src="/static/js/main.js"></script>
</body>
</html>
