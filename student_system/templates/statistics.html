<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计报表 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'statistics' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>统计报表</h1>
                    </div>

                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('overview')">数据概览</div>
                        <div class="tab" onclick="switchTab('students')">学生统计</div>
                        <div class="tab" onclick="switchTab('grades')">成绩统计</div>
                        <div class="tab" onclick="switchTab('ranking')">绩点排名</div>
                    </div>

                    <!-- 数据概览 -->
                    <div id="overview" class="tab-content active">
                        <div class="stats-grid" id="overviewStats">
                            <!-- 动态加载 -->
                        </div>
                    </div>

                    <!-- 学生统计 -->
                    <div id="students" class="tab-content">
                        <div class="filter-box">
                            <select id="studentGroupBy" onchange="loadStudentStats()">
                                <option value="department">按院系</option>
                                <option value="major">按专业</option>
                                <option value="class">按班级</option>
                            </select>
                        </div>
                        <div class="chart-grid">
                            <div class="chart-container">
                                <h3>学生人数分布</h3>
                                <table class="permission-table" id="studentDistTable">
                                    <thead>
                                        <tr><th>名称</th><th>学生人数</th><th>占比</th></tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                            <div class="chart-container">
                                <h3>性别比例</h3>
                                <table class="permission-table" id="genderTable">
                                    <thead>
                                        <tr><th>性别</th><th>人数</th><th>占比</th></tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- 成绩统计 -->
                    <div id="grades" class="tab-content">
                        <div class="filter-box">
                            <select id="semesterFilter" onchange="loadClassGradeStats()">
                                <option value="">所有学期</option>
                            </select>
                        </div>
                        <div class="chart-container">
                            <h3>班级平均成绩对比</h3>
                            <table class="permission-table" id="classGradeTable">
                                <thead>
                                    <tr>
                                        <th>班级</th>
                                        <th>专业</th>
                                        <th>院系</th>
                                        <th>学生数</th>
                                        <th>平均分</th>
                                        <th>平均绩点</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 绩点排名 -->
                    <div id="ranking" class="tab-content">
                        <div class="filter-box">
                            <select id="rankLimit" onchange="loadGpaRanking()">
                                <option value="10">前10名</option>
                                <option value="20">前20名</option>
                                <option value="50" selected>前50名</option>
                                <option value="100">前100名</option>
                            </select>
                        </div>
                        <div class="chart-container">
                            <h3>学生绩点排名</h3>
                            <table class="permission-table" id="rankingTable">
                                <thead>
                                    <tr>
                                        <th>排名</th>
                                        <th>学号</th>
                                        <th>姓名</th>
                                        <th>班级</th>
                                        <th>专业</th>
                                        <th>平均绩点</th>
                                        <th>已修学分</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'overview') loadOverview();
            else if (tabName === 'students') loadStudentStats();
            else if (tabName === 'grades') loadClassGradeStats();
            else if (tabName === 'ranking') loadGpaRanking();
        }

        // 加载概览数据
        function loadOverview() {
            fetch('/api/statistics/dashboard')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const d = data.data;

                        const container = document.getElementById('overviewStats');
                        container.innerHTML = '';
                        const items = [
                            { label: '学生总数', value: d.student_count },
                            { label: '教师总数', value: d.teacher_count },
                            { label: '课程总数', value: d.course_count },
                            { label: '院系总数', value: d.dept_count },
                            { label: '班级总数', value: d.class_count },
                            { label: '本学期选课', value: d.active_enrollments },
                        ];
                        items.forEach(item => {
                            const card = document.createElement('div');
                            card.className = 'stat-card-report';
                            const h3 = document.createElement('h3');
                            h3.textContent = item.label;
                            card.appendChild(h3);
                            const valDiv = document.createElement('div');
                            valDiv.className = 'value';
                            valDiv.textContent = item.value;
                            card.appendChild(valDiv);
                            container.appendChild(card);
                        });
                    }
                });
        }

        // 加载学生统计
        function loadStudentStats() {
            const groupBy = document.getElementById('studentGroupBy').value;

            fetch(`/api/statistics/students?group_by=${groupBy}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        // API 返回 {by_dept: [...], by_major: [...], by_class: [...], by_year: [...]}
                        const groupKey = groupBy === 'department' ? 'by_dept' : groupBy === 'major' ? 'by_major' : 'by_class';
                        const rows = data.data[groupKey] || [];
                        const total = rows.reduce((sum, r) => sum + r.count, 0);

                        const tbody = document.querySelector('#studentDistTable tbody');
                        tbody.innerHTML = '';
                        rows.forEach(r => {
                            const pct = total > 0 ? ((r.count / total) * 100).toFixed(1) : 0;
                            const tr = document.createElement('tr');
                            const tdName = document.createElement('td');
                            tdName.textContent = r.name + (r.parent_name ? ' (' + r.parent_name + ')' : '');
                            tr.appendChild(tdName);
                            const tdCount = document.createElement('td');
                            tdCount.textContent = r.count;
                            tr.appendChild(tdCount);
                            const tdPct = document.createElement('td');
                            const progressBar = document.createElement('div');
                            progressBar.className = 'progress-bar';
                            const progressFill = document.createElement('div');
                            progressFill.className = 'progress-fill';
                            progressBar.appendChild(progressFill);
                            tdPct.appendChild(progressBar);
                            const small = document.createElement('small');
                            small.textContent = pct + '%';
                            tdPct.appendChild(small);
                            tr.appendChild(tdPct);
                            tbody.appendChild(tr);
                        });
                    }
                });

            // 加载性别统计
            fetch('/api/statistics/gender')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const rows = data.data;
                        const totalCount = rows.reduce((sum, t) => sum + t.count, 0);

                        const tbody = document.querySelector('#genderTable tbody');
                        tbody.innerHTML = '';
                        rows.forEach(t => {
                            const pct = totalCount > 0 ? ((t.count / totalCount) * 100).toFixed(1) : 0;
                            const tr = document.createElement('tr');
                            const tdGender = document.createElement('td');
                            tdGender.textContent = t.gender || '未填写';
                            tr.appendChild(tdGender);
                            const tdCount = document.createElement('td');
                            tdCount.textContent = t.count;
                            tr.appendChild(tdCount);
                            const tdPct = document.createElement('td');
                            const progressBar = document.createElement('div');
                            progressBar.className = 'progress-bar';
                            const progressFill = document.createElement('div');
                            progressFill.className = 'progress-fill';
                            progressBar.appendChild(progressFill);
                            tdPct.appendChild(progressBar);
                            const small = document.createElement('small');
                            small.textContent = pct + '%';
                            tdPct.appendChild(small);
                            tr.appendChild(tdPct);
                            tbody.appendChild(tr);
                        });
                    }
                });
        }

        // 加载学期列表
        function loadSemesters() {
            fetch('/api/semesters?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const select = document.getElementById('semesterFilter');
                        const options = data.data.map(s => `<option value="${s.semester_id}">${s.academic_year} ${s.semester_name}</option>`).join('');
                        select.innerHTML = '<option value="">所有学期</option>' + options;
                    }
                });
        }

        // 加载班级成绩统计
        function loadClassGradeStats() {
            const semesterId = document.getElementById('semesterFilter').value;
            let url = '/api/statistics/class_grades';
            if (semesterId) url += `?semester_id=${semesterId}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const tbody = document.querySelector('#classGradeTable tbody');
                        tbody.innerHTML = '';
                        data.data.forEach(r => {
                            const tr = document.createElement('tr');
                            const tdClass = document.createElement('td');
                            tdClass.textContent = r.class_name;
                            tr.appendChild(tdClass);
                            const tdMajor = document.createElement('td');
                            tdMajor.textContent = r.major_name;
                            tr.appendChild(tdMajor);
                            const tdDept = document.createElement('td');
                            tdDept.textContent = r.dept_name;
                            tr.appendChild(tdDept);
                            const tdStudentCount = document.createElement('td');
                            tdStudentCount.textContent = r.student_count;
                            tr.appendChild(tdStudentCount);
                            const tdAvgScore = document.createElement('td');
                            tdAvgScore.textContent = r.avg_score ? r.avg_score.toFixed(2) : '-';
                            tr.appendChild(tdAvgScore);
                            const tdAvgGpa = document.createElement('td');
                            tdAvgGpa.textContent = r.avg_gpa ? r.avg_gpa.toFixed(2) : '-';
                            tr.appendChild(tdAvgGpa);
                            tbody.appendChild(tr);
                        });
                    }
                });
        }

        // 加载绩点排名
        function loadGpaRanking() {
            const limit = document.getElementById('rankLimit').value;

            fetch(`/api/statistics/gpa_ranking?limit=${limit}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const tbody = document.querySelector('#rankingTable tbody');
                        tbody.innerHTML = '';
                        data.data.forEach(r => {
                            const tr = document.createElement('tr');
                            const tdRank = document.createElement('td');
                            const strongRank = document.createElement('strong');
                            strongRank.textContent = r.rank;
                            tdRank.appendChild(strongRank);
                            tr.appendChild(tdRank);
                            const tdStudentId = document.createElement('td');
                            tdStudentId.textContent = r.student_id;
                            tr.appendChild(tdStudentId);
                            const tdName = document.createElement('td');
                            tdName.textContent = r.name;
                            tr.appendChild(tdName);
                            const tdClassName = document.createElement('td');
                            tdClassName.textContent = r.class_name;
                            tr.appendChild(tdClassName);
                            const tdMajorName = document.createElement('td');
                            tdMajorName.textContent = r.major_name;
                            tr.appendChild(tdMajorName);
                            const tdAvgGpa = document.createElement('td');
                            const strongGpa = document.createElement('strong');
                            strongGpa.textContent = r.avg_gpa ? r.avg_gpa.toFixed(2) : '-';
                            tdAvgGpa.appendChild(strongGpa);
                            tr.appendChild(tdAvgGpa);
                            const tdCredits = document.createElement('td');
                            tdCredits.textContent = r.total_credits || 0;
                            tr.appendChild(tdCredits);
                            tbody.appendChild(tr);
                        });
                    }
                });
        }

        // 初始化
        loadOverview();
        loadSemesters();
    </script>

    <script src="/static/js/main.js"></script>
</body>
</html>
