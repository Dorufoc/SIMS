<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院系管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'departments' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>院系管理</h1>
                        <button class="btn btn-primary" onclick="openModal()">新增院系</button>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>院系编号</th>
                                    <th>院系名称</th>
                                    <th>院长/主任</th>
                                    <th>联系电话</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="deptTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination">
                        <!-- 分页将通过JS生成 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="deptModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增院系</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="deptForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="deptId">
                <div class="form-group">
                    <label>院系名称 *</label>
                    <input type="text" id="deptName" required>
                </div>
                <div class="form-group">
                    <label>院长/主任</label>
                    <input type="text" id="dean">
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" id="phone">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;

        // 加载院系列表
        function loadDepartments(page = 1) {
            currentPage = page;
            let url = `/api/departments?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('deptTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(dept => `
                <tr>
                    <td>${dept.dept_id}</td>
                    <td>${dept.dept_name}</td>
                    <td>${dept.dean || '-'}</td>
                    <td>${dept.phone || '-'}</td>
                    <td class="actions">
                        <button class="btn btn-warning" onclick="editDept(${dept.dept_id}, '${dept.dept_name}', '${dept.dean || ''}', '${dept.phone || ''}')">编辑</button>
                        <button class="btn btn-danger" onclick="deleteDept(${dept.dept_id}, '${dept.dept_name}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = '';

            html += `<button class="page-btn" onclick="loadDepartments(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadDepartments(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }

            html += `<button class="page-btn" onclick="loadDepartments(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;

            pagination.innerHTML = html;
        }

        // 打开模态框
        function openModal() {
            document.getElementById('deptModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增院系';
            document.getElementById('deptForm').reset();
            document.getElementById('deptId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('deptModal').classList.remove('active');
        }

        // 编辑院系
        function editDept(id, name, dean, phone) {
            document.getElementById('deptModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '编辑院系';
            document.getElementById('deptId').value = id;
            document.getElementById('deptName').value = name;
            document.getElementById('dean').value = dean;
            document.getElementById('phone').value = phone;
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('deptId').value;
            const data = {
                dept_name: document.getElementById('deptName').value,
                dean: document.getElementById('dean').value,
                phone: document.getElementById('phone').value
            };

            const url = id ? `/api/departments/${id}` : '/api/departments';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadDepartments(currentPage);
                }
            });
        }

        // 删除院系
        function deleteDept(id, name) {
            if (!confirm(`确定要删除院系 "${name}" 吗？`)) return;

            fetch(`/api/departments/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) {
                        loadDepartments(currentPage);
                    }
                });
        }

        // 点击模态框外部关闭
        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'dept_id', label: '院系编号', type: 'number'},
                {name: 'dept_name', label: '院系名称', type: 'text'},
                {name: 'dean', label: '院长/主任', type: 'text'},
                {name: 'phone', label: '联系电话', type: 'text'}
            ],
            onApply: function(filters) { loadDepartments(1); },
            onReset: function(filters) { loadDepartments(1); }
        });
        loadDepartments();
    </script>

</body>
</html>
