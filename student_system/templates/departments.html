<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院系管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'departments' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>院系管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openModal()">新增院系</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th data-sort="dept_id">院系编号</th>
                                    <th data-sort="dept_name">院系名称</th>
                                    <th data-sort="dean">院长/主任</th>
                                    <th data-sort="phone">联系电话</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="deptTable">
                                <tr><td colspan="6" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination">
                        <!-- 分页将通过JS生成 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="deptModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增院系</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="deptForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="deptId">
                <div class="form-group">
                    <label>院系名称 *</label>
                    <input type="text" id="deptName" required>
                </div>
                <div class="form-group">
                    <label>院长/主任</label>
                    <input type="text" id="dean">
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" id="phone">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        let pager = null;

        // 加载院系列表
        function loadDepartments(page = 1) {
            let url = `/api/departments?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('deptTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 6;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(dept, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                const tr = document.createElement('tr');

                var cells = [rowIdx, dept.dept_id, dept.dept_name, dept.dean || '-', dept.phone || '-'];
                for (var ci = 0; ci < cells.length; ci++) {
                    var td = document.createElement('td');
                    td.textContent = String(cells[ci]);
                    tr.appendChild(td);
                }

                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-sm btn-primary';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editDept(dept.dept_id, dept.dept_name, dept.dean || '', dept.phone || ''); };
                tdActions.appendChild(btnEdit);

                tdActions.appendChild(document.createTextNode(' '));

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-sm btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteDept(dept.dept_id, dept.dept_name); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadDepartments(page); }
        });

        // 打开模态框
        function openModal() {
            document.getElementById('deptModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增院系';
            document.getElementById('deptForm').reset();
            document.getElementById('deptId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('deptModal').classList.remove('active');
        }

        // 编辑院系
        function editDept(id, name, dean, phone) {
            document.getElementById('deptModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '编辑院系';
            document.getElementById('deptId').value = id;
            document.getElementById('deptName').value = name;
            document.getElementById('dean').value = dean;
            document.getElementById('phone').value = phone;
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('deptId').value;
            const data = {
                dept_name: document.getElementById('deptName').value,
                dean: document.getElementById('dean').value,
                phone: document.getElementById('phone').value
            };

            const url = id ? `/api/departments/${id}` : '/api/departments';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadDepartments(pager.currentPage);
                }
            });
        }

        // 删除院系
        function deleteDept(id, name) {
            if (!confirm(`确定要删除院系 "${name}" 吗？`)) return;

            fetch(`/api/departments/${id}`, { method: 'DELETE', headers: { 'X-CSRF-Token': _csrf_token } })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) {
                        loadDepartments(pager.currentPage);
                    }
                });
        }

        // 点击模态框外部关闭
        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        }

        // 加载院系编号下拉选项后初始化筛选模块
        fetch('/api/departments?simple=1')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var deptOptions = [];
                if (data && data.length > 0) {
                    deptOptions = data.map(function(d) {
                        return {value: d.dept_id.toString(), label: d.dept_id + ' - ' + d.dept_name};
                    });
                }
                initFilterModule({
                    containerId: 'filterModule',
                    fields: [
                        {name: 'dept_id', label: '院系编号', type: 'select', options: deptOptions},
                        {name: 'dept_name', label: '院系名称', type: 'text'},
                        {name: 'dean', label: '院长/主任', type: 'text'},
                        {name: 'phone', label: '联系电话', type: 'text'}
                    ],
                    onApply: function(filters) { loadDepartments(1); },
                    onReset: function(filters) { loadDepartments(1); }
                });
                loadDepartments();
            });

        initSortableTable({
            tableId: 'deptTable',
            onSort: function(sort) {
                currentSort = sort;
                loadDepartments(1);
            }
        });

        initBatchImport({
            entityType: 'department',
            previewColumns: ['院系名称', '院长/主任', '联系电话'],
            requiredFieldIndex: 0,
            requiredFieldName: '院系名称',
            onImportSuccess: function() { loadDepartments(1); }
        });
    </script>
</body>
</html>
