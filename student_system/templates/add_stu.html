{% set active_page = 'add_stu' %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增学生</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="add-student-container">
            <h2>新增学生</h2>
            <form id="add_stu_form" class="stu-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="student_no">学号</label>
                        <input type="text" id="student_no" name="student_id" required placeholder="请输入学号">
                    </div>
                    <div class="form-group">
                        <label for="student_name">姓名</label>
                        <input type="text" id="student_name" name="student_name" required placeholder="请输入姓名">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">性别</label>
                        <select id="gender" name="gender" required>
                            <option value="">请选择</option>
                            <option value="M">男</option>
                            <option value="F">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="age">年龄</label>
                        <input type="date" id="age" name="birth_date" placeholder="请输入出生日期">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="dept_select">学院</label>
                        <select id="dept_select" required>
                            <option value="">-- 请选择学院 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="major_select">专业</label>
                        <select id="major_select" required>
                            <option value="">-- 请先选择学院 --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="class_select">班级</label>
                        <select id="class_select" name="class_id" required>
                            <option value="">-- 请先选择专业 --</option>
                        </select>
                    </div>
                </div>
                <div class="form-group form-group-actions">
                    <button type="submit" class="btn btn-primary">提交</button>
                    <button type="reset" class="btn btn-secondary">重置</button>
                </div>
            </form>
            <div id="msg_box" class="msg-box" style="display:none;"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div></div>

    <script src="/static/js/main.js"></script>
    <script>
        var add_stu_form = document.getElementById('add_stu_form');
        var msg_box = document.getElementById('msg_box');

        function show_msg(text, is_success) {
            msg_box.textContent = text;
            msg_box.className = 'msg-box ' + (is_success ? 'msg-success' : 'msg-error');
            msg_box.style.display = 'block';
        }

        function hide_msg() {
            msg_box.style.display = 'none';
        }

        add_stu_form.addEventListener('submit', function(e) {
            e.preventDefault();
            hide_msg();

            var form_data = new FormData(add_stu_form);
            var params = new URLSearchParams();
            form_data.forEach(function(value, key) {
                params.append(key, value);
            });

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/add', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.setRequestHeader('X-CSRF-Token', _csrf_token);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    hide_loading();
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            if (res.code === 0) {
                                show_msg('新增成功！', true);
                                var go_next = confirm('学生信息已成功添加，是否继续新增？');
                                if (go_next) {
                                    add_stu_form.reset();
                                } else {
                                    window.location.href = '/manage';
                                }
                            } else {
                                show_msg(res.msg || '新增失败', false);
                            }
                        } catch (err) {
                            show_msg('服务器响应异常', false);
                        }
                    } else {
                        show_msg('请求失败，状态码：' + xhr.status, false);
                    }
                }
            };
            xhr.send(params.toString());
            show_loading();
        });

        /* ========== 三级联动选择器 ========== */
        var dept_select = document.getElementById('dept_select');
        var major_select = document.getElementById('major_select');
        var class_select = document.getElementById('class_select');

        // 加载学院列表
        function load_departments() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/departments', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var depts = JSON.parse(xhr.responseText);
                        dept_select.innerHTML = '<option value="">-- 请选择学院 --</option>';
                        depts.forEach(function(d) {
                            var opt = document.createElement('option');
                            opt.value = d.dept_id;
                            opt.textContent = d.dept_name;
                            dept_select.appendChild(opt);
                        });
                    } catch(e) {}
                }
            };
            xhr.send();
        }
        load_departments();

        // 学院变化  加载专业
        dept_select.addEventListener('change', function() {
            var dept_id = this.value;
            major_select.innerHTML = '<option value="">-- 请选择专业 --</option>';
            class_select.innerHTML = '<option value="">-- 请先选择专业 --</option>';
            class_select.disabled = true;
            
            if (!dept_id) return;
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/majors?dept_id=' + dept_id, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var majors = JSON.parse(xhr.responseText);
                        majors.forEach(function(m) {
                            var opt = document.createElement('option');
                            opt.value = m.major_id;
                            opt.textContent = m.major_name;
                            major_select.appendChild(opt);
                        });
                        major_select.disabled = false;
                    } catch(e) {}
                }
            };
            xhr.send();
        });

        // 专业变化  加载班级
        major_select.addEventListener('change', function() {
            var major_id = this.value;
            class_select.innerHTML = '<option value="">-- 请选择班级 --</option>';
            
            if (!major_id) return;
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/classes?major_id=' + major_id, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var classes = JSON.parse(xhr.responseText);
                        classes.forEach(function(c) {
                            var opt = document.createElement('option');
                            opt.value = c.class_id;
                            opt.textContent = c.class_name + ' (' + c.enrollment_year + '年)';
                            class_select.appendChild(opt);
                        });
                        class_select.disabled = false;
                    } catch(e) {}
                }
            };
            xhr.send();
        });
    </script>
</body>
</html>
