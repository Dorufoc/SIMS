<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖惩管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'rewards' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>奖惩管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openModal()">新增记录</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>编号</th>
                                    <th data-sort="student_id">学号</th>
                                    <th data-sort="student_name">学生姓名</th>
                                    <th data-sort="rp_type">类型</th>
                                    <th data-sort="title">标题</th>
                                    <th data-sort="date">日期</th>
                                    <th>原因</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="rewardTable">
                                <tr><td colspan="9" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination">
                        <!-- 分页将通过JS生成 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="rewardModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增记录</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="rewardForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="rpId">
                <div class="form-group">
                    <label>学号 *</label>
                    <input type="text" id="studentId" required>
                </div>
                <div class="form-group">
                    <label>类型 *</label>
                    <select id="rpType" required>
                        <option value="">请选择类型</option>
                        <option value="奖励">奖励</option>
                        <option value="处分">处分</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <select id="title" required>
                        <option value="">请选择标题</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>日期 *</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>原因</label>
                    <input type="text" id="reason" maxlength="20">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="remark">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        var currentSort = { sort_by: '', sort_order: 'asc' };

        // 加载奖惩列表
        function loadRewards(page = 1) {
            let url = `/api/rewards_punishments?page=${page}&page_size=10`;
            if (currentSort.sort_by) {
                url += '&sort_by=' + encodeURIComponent(currentSort.sort_by) + '&sort_order=' + encodeURIComponent(currentSort.sort_order);
            }
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('rewardTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 9;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(item, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                const dateStr = item.date ? item.date.substring(0, 10) : '-';

                const tr = document.createElement('tr');

                // 序号
                var td1 = document.createElement('td');
                td1.textContent = rowIdx;
                tr.appendChild(td1);

                // 编号
                var td2 = document.createElement('td');
                td2.textContent = item.rp_id;
                tr.appendChild(td2);

                // 学号
                var td3 = document.createElement('td');
                td3.textContent = item.student_id;
                tr.appendChild(td3);

                // 学生姓名
                var td4 = document.createElement('td');
                td4.textContent = item.student_name || '-';
                if (item.student_name) td4.style.color = '#2b6cb0';
                tr.appendChild(td4);

                // 类型
                var td5 = document.createElement('td');
                const typeSpan = document.createElement('span');
                typeSpan.className = 'status-tag ' + (item.rp_type === '奖励' ? 'active' : 'inactive');
                typeSpan.textContent = item.rp_type;
                td5.appendChild(typeSpan);
                tr.appendChild(td5);

                // 标题
                var td6 = document.createElement('td');
                td6.textContent = item.title;
                tr.appendChild(td6);

                // 日期
                var td7 = document.createElement('td');
                td7.textContent = dateStr;
                tr.appendChild(td7);

                // 原因
                var td8 = document.createElement('td');
                td8.textContent = item.reason || '-';
                tr.appendChild(td8);

                // 操作
                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-sm btn-primary';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editReward(item); };
                tdActions.appendChild(btnEdit);

                tdActions.appendChild(document.createTextNode(' '));

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-sm btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteReward(item.rp_id); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 打开模态框
        function openModal() {
            document.getElementById('rewardModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增记录';
            document.getElementById('rewardForm').reset();
            document.getElementById('rpId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('rewardModal').classList.remove('active');
        }

        // 标题选项映射
        var titleOptions = {
            '奖励': ['三好学生', '奖学金'],
            '处分': ['开除', '留校察看', '严重警告', '警告']
        };

        // 根据类型更新标题下拉选项
        function updateTitleOptions(rpType) {
            var select = document.getElementById('title');
            var currentVal = select.value;
            select.innerHTML = '<option value="">请选择标题</option>';
            if (rpType && titleOptions[rpType]) {
                titleOptions[rpType].forEach(function(t) {
                    var opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    select.appendChild(opt);
                });
            }
            // 如果当前值在选项中，保持选中
            if (currentVal && titleOptions[rpType] && titleOptions[rpType].indexOf(currentVal) !== -1) {
                select.value = currentVal;
            }
        }

        // 类型变更时更新标题选项
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('rpType').addEventListener('change', function() {
                updateTitleOptions(this.value);
            });
        });

        // 编辑奖惩记录
        function editReward(item) {
            document.getElementById('rewardModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '编辑记录';
            document.getElementById('rpId').value = item.rp_id;
            document.getElementById('studentId').value = item.student_id;
            document.getElementById('rpType').value = item.rp_type;
            // 先更新标题下拉选项，再设置值
            updateTitleOptions(item.rp_type);
            document.getElementById('title').value = item.title;
            document.getElementById('date').value = item.date ? item.date.substring(0, 10) : '';
            document.getElementById('reason').value = item.reason || '';
            document.getElementById('remark').value = item.remark || '';
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('rpId').value;
            const data = {
                student_id: document.getElementById('studentId').value,
                rp_type: document.getElementById('rpType').value,
                title: document.getElementById('title').value,
                date: document.getElementById('date').value,
                reason: document.getElementById('reason').value,
                remark: document.getElementById('remark').value
            };

            const url = id ? `/api/rewards_punishments/${id}` : '/api/rewards_punishments';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': _csrf_token
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadRewards(pager.currentPage);
                }
            });
        }

        // 删除奖惩记录
        function deleteReward(id) {
            if (!confirm(`确定要删除该奖惩记录吗？`)) return;

            fetch(`/api/rewards_punishments/${id}`, {
                method: 'DELETE',
                headers: { 'X-CSRF-Token': _csrf_token }
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) {
                        loadRewards(pager.currentPage);
                    }
                });
        }

        // 点击模态框外部关闭
        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'student_id', label: '学号', type: 'text'},
                {name: 'rp_type', label: '类型', type: 'select', options: ['奖励', '处分']},
                {name: 'title', label: '标题', type: 'text'}
            ],
            onApply: function(filters) { loadRewards(1); },
            onReset: function(filters) { loadRewards(1); }
        });
        loadRewards();

        initSortableTable({
            tableId: 'rewardTable',
            onSort: function(sort) {
                currentSort = sort;
                loadRewards(1);
            }
        });

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadRewards(page); }
        });

        initBatchImport({
            entityType: 'reward',
            previewColumns: ['学号', '类型', '标题', '日期'],
            requiredFieldIndex: 0,
            requiredFieldName: '学号',
            onImportSuccess: function() { loadRewards(1); }
        });
    </script>
</body>
</html>
