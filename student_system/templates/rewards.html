<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖惩管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'rewards' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>奖惩管理</h1>
                        <button class="btn btn-primary" onclick="openModal()">新增记录</button>
                    </div>

                    <!-- 批量导入导出 -->
                    {% include '_batch_import.html' %}

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>编号</th>
                                    <th>学号</th>
                                    <th>类型</th>
                                    <th>标题</th>
                                    <th>级别</th>
                                    <th>日期</th>
                                    <th>发文单位</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="rewardTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination">
                        <!-- 分页将通过JS生成 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="rewardModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增记录</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="rewardForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="rpId">
                <div class="form-group">
                    <label>学号 *</label>
                    <input type="text" id="studentId" required>
                </div>
                <div class="form-group">
                    <label>类型 *</label>
                    <select id="rpType" required>
                        <option value="">请选择类型</option>
                        <option value="奖励">奖励</option>
                        <option value="处分">处分</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>级别</label>
                    <input type="text" id="level">
                </div>
                <div class="form-group">
                    <label>日期 *</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>原因</label>
                    <input type="text" id="reason">
                </div>
                <div class="form-group">
                    <label>发文单位</label>
                    <input type="text" id="issuingAuthority">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <input type="text" id="remark">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;

        // 加载奖惩列表
        function loadRewards(page = 1) {
            currentPage = page;
            let url = `/api/rewards_punishments?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('rewardTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach(item => {
                const dateStr = item.date ? item.date.substring(0, 10) : '-';

                const tr = document.createElement('tr');

                const tdId = document.createElement('td');
                tdId.textContent = item.rp_id;
                tr.appendChild(tdId);

                const tdStudent = document.createElement('td');
                tdStudent.textContent = item.student_id;
                tr.appendChild(tdStudent);

                const tdType = document.createElement('td');
                const typeSpan = document.createElement('span');
                typeSpan.className = 'status-tag ' + (item.rp_type === '奖励' ? 'active' : 'inactive');
                typeSpan.textContent = item.rp_type;
                tdType.appendChild(typeSpan);
                tr.appendChild(tdType);

                const tdTitle = document.createElement('td');
                tdTitle.textContent = item.title;
                tr.appendChild(tdTitle);

                const tdLevel = document.createElement('td');
                tdLevel.textContent = item.level || '-';
                tr.appendChild(tdLevel);

                const tdDate = document.createElement('td');
                tdDate.textContent = dateStr;
                tr.appendChild(tdDate);

                const tdAuthority = document.createElement('td');
                tdAuthority.textContent = item.issuing_authority || '-';
                tr.appendChild(tdAuthority);

                const tdActions = document.createElement('td');
                tdActions.className = 'actions';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-warning';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editReward(item); };
                tdActions.appendChild(btnEdit);

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteReward(item.rp_id); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = '';

            html += `<button class="page-btn" onclick="loadRewards(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadRewards(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }

            html += `<button class="page-btn" onclick="loadRewards(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;

            pagination.innerHTML = html;
        }

        // 打开模态框
        function openModal() {
            document.getElementById('rewardModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增记录';
            document.getElementById('rewardForm').reset();
            document.getElementById('rpId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('rewardModal').classList.remove('active');
        }

        // 编辑奖惩记录
        function editReward(item) {
            document.getElementById('rewardModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '编辑记录';
            document.getElementById('rpId').value = item.rp_id;
            document.getElementById('studentId').value = item.student_id;
            document.getElementById('rpType').value = item.rp_type;
            document.getElementById('title').value = item.title;
            document.getElementById('level').value = item.level || '';
            document.getElementById('date').value = item.date ? item.date.substring(0, 10) : '';
            document.getElementById('reason').value = item.reason || '';
            document.getElementById('issuingAuthority').value = item.issuing_authority || '';
            document.getElementById('remark').value = item.remark || '';
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('rpId').value;
            const data = {
                student_id: document.getElementById('studentId').value,
                rp_type: document.getElementById('rpType').value,
                title: document.getElementById('title').value,
                level: document.getElementById('level').value,
                date: document.getElementById('date').value,
                reason: document.getElementById('reason').value,
                issuing_authority: document.getElementById('issuingAuthority').value,
                remark: document.getElementById('remark').value
            };

            const url = id ? `/api/rewards_punishments/${id}` : '/api/rewards_punishments';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-Token': _csrf_token
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadRewards(currentPage);
                }
            });
        }

        // 删除奖惩记录
        function deleteReward(id) {
            if (!confirm(`确定要删除该奖惩记录吗？`)) return;

            fetch(`/api/rewards_punishments/${id}`, {
                method: 'DELETE',
                headers: { 'X-CSRF-Token': _csrf_token }
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) {
                        loadRewards(currentPage);
                    }
                });
        }

        // 点击模态框外部关闭
        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'student_id', label: '学号', type: 'text'},
                {name: 'rp_type', label: '类型', type: 'select', options: ['奖励', '处分']},
                {name: 'title', label: '标题', type: 'text'}
            ],
            onApply: function(filters) { loadRewards(1); },
            onReset: function(filters) { loadRewards(1); }
        });
        loadRewards();

        initBatchImport({
            entityType: 'reward',
            previewColumns: ['学号', '类型', '标题', '级别', '日期'],
            requiredFieldIndex: 0,
            requiredFieldName: '学号',
            onImportSuccess: function() { loadRewards(1); }
        });
    </script>

</body>
</html>
