<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据管理</title>
    <link rel="stylesheet" href="/static/css/style.css?v=9">
</head>
<body>
    {% set active_page = 'manage' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>数据管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="open_add_modal()">新增学生</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th data-sort="student_id">学号</th>
                                    <th data-sort="student_name">姓名</th>
                                    <th data-sort="gender">性别</th>
                                    <th data-sort="birth_date">年龄</th>
                                    <th data-sort="class_name">班级</th>
                                    <th data-sort="enrollment_year">年级</th>
                                    <th data-sort="major_name">专业</th>
                                    <th data-sort="dept_name">学院</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="student-table-body">
                                <tr>
                                    <td colspan="10" class="empty-row">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
    </main>
</div>

    <!-- 编辑模态框 -->
    <div id="edit_modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑学生信息</h3>
                <button type="button" class="modal-close" onclick="close_edit_modal()">&times;</button>
            </div>
            <form id="edit_stu_form">
                <input type="hidden" id="edit_id" name="id">
                <div class="form-group">
                    <label for="edit_student_no">学号</label>
                    <input type="text" id="edit_student_no" name="student_id" required>
                </div>
                <div class="form-group">
                    <label for="edit_student_name">姓名</label>
                    <input type="text" id="edit_student_name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="edit_gender">性别</label>
                    <select id="edit_gender" name="gender" required>
                        <option value="">请选择</option>
                        <option value="M">男</option>
                        <option value="F">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit_age">年龄</label>
                    <input type="date" id="edit_age" name="birth_date">
                </div>
                <div class="form-group">
                    <label for="edit_class_id">班级</label>
                    <select id="edit_class_id" name="class_id">
                        <option value="">-- 请选择班级 --</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
            <div id="edit_msg_box" class="msg-box" style="display:none;"></div>
        </div>
    </div>

    <!-- 新增学生模态框 -->
    <div id="add_modal" class="modal-overlay">
        <div class="modal-content" style="max-width:560px">
            <div class="modal-header">
                <h3>新增学生</h3>
                <button type="button" class="modal-close" onclick="close_add_modal()">&times;</button>
            </div>
            <form id="add_stu_form_modal">
                <div class="form-row">
                    <div class="form-group">
                        <label>学号 *</label>
                        <input type="text" id="add_student_no" name="student_id" required placeholder="请输入学号">
                    </div>
                    <div class="form-group">
                        <label>姓名 *</label>
                        <input type="text" id="add_name" name="name" required placeholder="请输入姓名">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>性别</label>
                        <select id="add_gender" name="gender">
                            <option value="">请选择</option>
                            <option value="M">男</option>
                            <option value="F">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>出生日期</label>
                        <input type="date" id="add_birth_date" name="birth_date">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>入学年份</label>
                        <input type="number" id="add_enrollment_year" name="enrollment_year" placeholder="如：2024" min="2000" max="2099">
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="text" id="add_phone" name="phone" placeholder="请输入电话">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>学院</label>
                        <select id="add_dept_select">
                            <option value="">-- 请选择学院 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>专业</label>
                        <select id="add_major_select">
                            <option value="">-- 请先选择学院 --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>班级</label>
                        <select id="add_class_select" name="class_id">
                            <option value="">-- 请先选择专业 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="add_email" name="email" placeholder="请输入邮箱">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">提交</button>
            </form>
            <div id="add_msg_box" class="msg-box" style="display:none;"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div></div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        /* ========== 批量导入初始化 ========== */
        initBatchImport({
            entityType: 'student',
            previewColumns: ['学号', '姓名', '性别', '出生日期', '入学年份', '班级编号'],
            requiredFieldIndex: 0,
            requiredFieldName: '学号',
            onImportSuccess: function() { loadStudents(1); }
        });

        /* ========== 删除操作 ========== */
        function delete_student(stu_id, stu_name) {
            var confirmed = confirm('确定要删除学生"' + stu_name + '"的信息吗？此操作不可恢复。');
            if (!confirmed) return;

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/delete/' + stu_id, true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.setRequestHeader('X-CSRF-Token', _csrf_token);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    hide_loading();
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            if (res.code === 0) {
                                alert('删除成功');
                                loadStudents(1);
                            } else {
                                alert('删除失败：' + (res.msg || '未知错误'));
                            }
                        } catch (err) {
                            alert('删除响应解析失败');
                        }
                    } else {
                        alert('删除请求失败，状态码：' + xhr.status);
                    }
                }
            };
            xhr.send();
            show_loading();
        }

        /* ========== 编辑模态框 ========== */
        var edit_modal = document.getElementById('edit_modal');
        var edit_stu_form = document.getElementById('edit_stu_form');
        var edit_msg_box = document.getElementById('edit_msg_box');

        function open_edit_modal(stu_id, stu_no, stu_name, gender, age, class_id) {
            edit_modal.classList.add('active');
            document.getElementById('edit_id').value = stu_id;
            document.getElementById('edit_student_no').value = stu_no;
            document.getElementById('edit_student_name').value = stu_name;
            document.getElementById('edit_gender').value = gender || '';
            document.getElementById('edit_age').value = age || '';
            
            // 加载班级列表
            var classSelect = document.getElementById('edit_class_id');
            classSelect.innerHTML = '<option value="">-- 请选择班级 --</option>';
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/classes?page=-1', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var resp = JSON.parse(xhr.responseText);
                        var classes = resp.code === 0 ? (resp.data || []) : [];
                        classes.forEach(function(c) {
                            var opt = document.createElement('option');
                            opt.value = c.class_id;
                            opt.textContent = c.class_name + ' (' + c.enrollment_year + ')';
                            if (c.class_id == class_id) opt.selected = true;
                            classSelect.appendChild(opt);
                        });
                    } catch(e) {}
                }
            };
            xhr.send();
            
            edit_msg_box.style.display = 'none';
        }

        function close_edit_modal() {
            edit_modal.classList.remove('active');
            edit_stu_form.reset();
        }

        edit_stu_form.addEventListener('submit', function(e) {
            e.preventDefault();
            edit_msg_box.style.display = 'none';

            var form_data = new FormData(edit_stu_form);
            var params = new URLSearchParams();
            form_data.forEach(function(value, key) {
                params.append(key, value);
            });

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/edit/' + document.getElementById('edit_id').value, true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.setRequestHeader('X-CSRF-Token', _csrf_token);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    hide_loading();
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            if (res.code === 0) {
                                close_edit_modal();
                                loadStudents(1);
                            } else {
                                edit_msg_box.textContent = res.msg || '编辑失败';
                                edit_msg_box.className = 'msg-box msg-error';
                                edit_msg_box.style.display = 'block';
                            }
                        } catch (err) {
                            edit_msg_box.textContent = '服务器响应异常';
                            edit_msg_box.className = 'msg-box msg-error';
                            edit_msg_box.style.display = 'block';
                        }
                    } else {
                        edit_msg_box.textContent = '请求失败，状态码：' + xhr.status;
                        edit_msg_box.className = 'msg-box msg-error';
                        edit_msg_box.style.display = 'block';
                    }
                }
            };
            xhr.send(params.toString());
            show_loading();
        });
        edit_modal.addEventListener('click', function(e) {
            if (e.target === edit_modal) {
                close_edit_modal();
            }
        });

        /* ========== 新增学生模态框 ========== */
        var add_modal = document.getElementById('add_modal');
        var add_stu_form_modal = document.getElementById('add_stu_form_modal');
        var add_msg_box = document.getElementById('add_msg_box');
        var add_dept_select = document.getElementById('add_dept_select');
        var add_major_select = document.getElementById('add_major_select');
        var add_class_select = document.getElementById('add_class_select');

        function open_add_modal() {
            add_modal.classList.add('active');
            add_stu_form_modal.reset();
            add_msg_box.style.display = 'none';
            // 加载学院列表
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/departments', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var depts = JSON.parse(xhr.responseText);
                        add_dept_select.innerHTML = '<option value="">-- 请选择学院 --</option>';
                        if (depts.code === 0 && depts.data) {
                            depts.data.forEach(function(d) {
                                var opt = document.createElement('option');
                                opt.value = d.dept_id;
                                opt.textContent = d.dept_name;
                                add_dept_select.appendChild(opt);
                            });
                        } else if (Array.isArray(depts)) {
                            depts.forEach(function(d) {
                                var opt = document.createElement('option');
                                opt.value = d.dept_id;
                                opt.textContent = d.dept_name;
                                add_dept_select.appendChild(opt);
                            });
                        }
                    } catch(e) {}
                }
            };
            xhr.send();
        }

        function close_add_modal() {
            add_modal.classList.remove('active');
        }

        // 学院变化 → 加载专业
        add_dept_select.addEventListener('change', function() {
            var dept_id = this.value;
            add_major_select.innerHTML = '<option value="">-- 请选择专业 --</option>';
            add_class_select.innerHTML = '<option value="">-- 请先选择专业 --</option>';
            add_class_select.disabled = true;
            if (!dept_id) return;
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/majors?dept_id=' + dept_id, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var majors = JSON.parse(xhr.responseText);
                        if (majors.code === 0 && majors.data) {
                            majors.data.forEach(function(m) {
                                var opt = document.createElement('option');
                                opt.value = m.major_id;
                                opt.textContent = m.major_name;
                                add_major_select.appendChild(opt);
                            });
                        } else if (Array.isArray(majors)) {
                            majors.forEach(function(m) {
                                var opt = document.createElement('option');
                                opt.value = m.major_id;
                                opt.textContent = m.major_name;
                                add_major_select.appendChild(opt);
                            });
                        }
                        add_major_select.disabled = false;
                    } catch(e) {}
                }
            };
            xhr.send();
        });

        // 专业变化 → 加载班级
        add_major_select.addEventListener('change', function() {
            var major_id = this.value;
            add_class_select.innerHTML = '<option value="">-- 请选择班级 --</option>';
            if (!major_id) return;
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/classes?major_id=' + major_id, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var classes = JSON.parse(xhr.responseText);
                        if (classes.code === 0 && classes.data) {
                            classes.data.forEach(function(c) {
                                var opt = document.createElement('option');
                                opt.value = c.class_id;
                                opt.textContent = c.class_name;
                                add_class_select.appendChild(opt);
                            });
                        } else if (Array.isArray(classes)) {
                            classes.forEach(function(c) {
                                var opt = document.createElement('option');
                                opt.value = c.class_id;
                                opt.textContent = c.class_name;
                                add_class_select.appendChild(opt);
                            });
                        }
                        add_class_select.disabled = false;
                    } catch(e) {}
                }
            };
            xhr.send();
        });

        // 提交新增表单
        add_stu_form_modal.addEventListener('submit', function(e) {
            e.preventDefault();
            add_msg_box.style.display = 'none';

            var form_data = new FormData(add_stu_form_modal);
            var params = new URLSearchParams();
            form_data.forEach(function(value, key) {
                params.append(key, value);
            });

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/add', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.setRequestHeader('X-CSRF-Token', _csrf_token);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    hide_loading();
                    if (xhr.status === 200) {
                        try {
                            var res = JSON.parse(xhr.responseText);
                            if (res.code === 0) {
                                add_msg_box.textContent = '新增成功！';
                                add_msg_box.className = 'msg-box msg-success';
                                add_msg_box.style.display = 'block';
                                setTimeout(function() {
                                    close_add_modal();
                                    loadStudents(1);
                                }, 800);
                            } else {
                                add_msg_box.textContent = res.msg || '新增失败';
                                add_msg_box.className = 'msg-box msg-error';
                                add_msg_box.style.display = 'block';
                            }
                        } catch (err) {
                            add_msg_box.textContent = '服务器响应异常';
                            add_msg_box.className = 'msg-box msg-error';
                            add_msg_box.style.display = 'block';
                        }
                    } else {
                        add_msg_box.textContent = '请求失败，状态码：' + xhr.status;
                        add_msg_box.className = 'msg-box msg-error';
                        add_msg_box.style.display = 'block';
                    }
                }
            };
            xhr.send(params.toString());
            show_loading();
        });

        // 点击遮罩关闭
        add_modal.addEventListener('click', function(e) {
            if (e.target === add_modal) {
                close_add_modal();
            }
        });

        /* ========== 学生表格渲染 ========== */
        var pager = null;
        var currentSort = { sort_by: '', sort_order: 'asc' };

        function loadStudents(page) {
            var url = '/api/students?page=' + page;
            if (currentSort.sort_by) {
                url += '&sort_by=' + encodeURIComponent(currentSort.sort_by) + '&sort_order=' + encodeURIComponent(currentSort.sort_order);
            }
            var filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url).then(function(r) { return r.json(); }).then(function(d) {
                if (d.code === 0) {
                    renderStudentTable(d.data);
                    pager.update({ currentPage: page, totalPages: d.total_pages || 1 });
                }
            });
        }

        function renderStudentTable(students) {
            var tbody = document.getElementById('student-table-body');
            if (!tbody) return;
            if (!students || students.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 10;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }
            tbody.innerHTML = '';
            students.forEach(function(s, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                var gender = s.gender || '';
                var genderDisplay = s.gender_text || gender;
                var birthDate = (s.birth_date !== null && s.birth_date !== undefined) ? s.birth_date : '';
                var className = s.class_name || '';
                var enrollmentYear = s.enrollment_year || '';
                var majorName = s.major_name || '';
                var deptName = s.dept_name || '';
                var classId = (s.class_id !== null && s.class_id !== undefined) ? s.class_id : 'null';

                var tr = document.createElement('tr');
                var cells = [
                    rowIdx, s.student_id || '', s.student_name || '',
                    genderDisplay, birthDate, className, enrollmentYear, majorName, deptName
                ];
                for (var ci = 0; ci < cells.length; ci++) {
                    var td = document.createElement('td');
                    td.textContent = String(cells[ci]);
                    tr.appendChild(td);
                }

                var actionTd = document.createElement('td');
                actionTd.className = 'action-cell';

                var editBtn = document.createElement('button');
                editBtn.type = 'button';
                editBtn.className = 'btn btn-sm btn-primary';
                editBtn.textContent = '编辑';
                editBtn.setAttribute('data-stu-id', s.student_id);
                editBtn.setAttribute('data-stu-no', s.student_id || '');
                editBtn.setAttribute('data-stu-name', s.student_name || '');
                editBtn.setAttribute('data-stu-gender', gender || '');
                editBtn.setAttribute('data-stu-birth', s.birth_date || '');
                editBtn.setAttribute('data-stu-class-id', classId);
                editBtn.addEventListener('click', function() {
                    open_edit_modal(
                        this.getAttribute('data-stu-id'),
                        this.getAttribute('data-stu-no'),
                        this.getAttribute('data-stu-name'),
                        this.getAttribute('data-stu-gender'),
                        this.getAttribute('data-stu-birth'),
                        this.getAttribute('data-stu-class-id')
                    );
                });
                actionTd.appendChild(editBtn);

                actionTd.appendChild(document.createTextNode(' '));

                var delBtn = document.createElement('button');
                delBtn.type = 'button';
                delBtn.className = 'btn btn-sm btn-danger';
                delBtn.textContent = '删除';
                delBtn.addEventListener('click', function() {
                    delete_student(s.student_id, s.student_name || '');
                });
                actionTd.appendChild(delBtn);

                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

        /* ========== 分页初始化 ========== */
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function(page) { loadStudents(page); }
        });

        /* ========== 筛选模块初始化（使用main.js中的统一函数） ========== */
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'student_id', label: '学号', type: 'text'},
                {name: 'student_name', label: '姓名', type: 'text'},
                {name: 'gender', label: '性别', type: 'select', options: [{value: 'M', label: '男'}, {value: 'F', label: '女'}]},
                {name: 'class_name', label: '班级', type: 'text'},
                {name: 'enrollment_year', label: '入学年份', type: 'number'},
                {name: 'major_name', label: '专业', type: 'text'},
                {name: 'dept_name', label: '学院', type: 'text'}
            ],
            onApply: function(filters) {
                loadStudents(1);
            },
            onReset: function() {
                loadStudents(1);
            }
        });

        initSortableTable({
            tableId: 'student-table-body',
            onSort: function(sort) {
                currentSort = sort;
                loadStudents(1);
            }
        });
        loadStudents(1);
    </script>
</body>
</html>
