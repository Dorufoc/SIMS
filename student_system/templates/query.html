<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合查询 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="{{ url_for('static', filename='js/pagination.js') }}"></script>
</head>
<body>
    {% set active_page = 'query' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            {% block content %}
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>综合查询</h1>
                    </div>

                    <div class="comprehensive-header">
                        <p class="comprehensive-desc">选择主表后系统自动解析关联表，拼接生成联合大表，支持多条件筛选</p>
                    </div>

                    <div class="comp-section">
                        <div class="comp-section-header">
                            <span class="comp-step-badge">1</span>
                            <h3>选择主表</h3>
                        </div>
                        <div class="comp-section-body">
                            <select id="comp-main-table" class="form-control" style="max-width: 300px;">
                                <option value="">-- 请选择主表 --</option>
                            </select>
                            <span class="comp-hint" id="comp-main-table-hint"></span>
                        </div>
                        <div class="comp-fields-preview" id="comp-fields-preview" style="display:none;">
                            <h4>主表字段</h4>
                            <div class="comp-fields-tags" id="comp-fields-tags"></div>
                        </div>
                    </div>

                    <div class="comp-section" id="comp-relations-section" style="display:none;">
                        <div class="comp-section-header">
                            <span class="comp-step-badge">2</span>
                            <h3>关联表（自动识别）</h3>
                        </div>
                        <div class="comp-section-body">
                            <p class="comp-sub-desc">系统已自动识别以下可关联的数据表，勾选需要纳入联合查询的关联表：</p>
                            <div class="comp-relations-list" id="comp-relations-list"></div>
                            <div class="comp-empty-hint" id="comp-relations-empty" style="display:none;">
                                该表无可关联的业务表
                            </div>
                        </div>
                    </div>

                    <div class="comp-section" id="comp-filter-section" style="display:none;">
                        <div class="comp-section-header">
                            <span class="comp-step-badge">3</span>
                            <h3>筛选条件</h3>
                        </div>
                        <div class="comp-section-body">
                            <div class="filter-builder" id="comp-filter-module">
                                <div class="filter-builder-header">
                                    <button class="btn btn-primary" id="comp-btn-add-filter">
                                        <span class="btn-icon">+</span> 添加筛选条件
                                    </button>
                                    <button class="btn" id="comp-btn-reset-filters">重置条件</button>
                                </div>
                                <div class="filter-rows-container" id="comp-filter-rows">
                                    <div class="filter-empty-hint" id="comp-filter-empty-hint">
                                        暂无筛选条件，点击"添加筛选条件"添加
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="comp-actions" id="comp-actions" style="display:none;">
                        <button class="btn btn-primary" id="comp-btn-query">查询</button>
                        <button class="btn" id="comp-btn-reset-all">全部重置</button>
                    </div>

                    <div class="comp-loading" id="comp-loading" style="display:none;">
                        <div class="loading-spinner"></div>
                        <span>正在查询...</span>
                    </div>

                    <div class="filter-result-stats" id="comp-result-stats" style="display:none;">
                        <span>共 <strong id="comp-total-count">0</strong> 条记录</span>
                    </div>

                    <div class="permission-table-container" id="comp-result" style="display:none;">
                        <div style="overflow-x: auto;">
                            <table class="permission-table" id="comp-table">
                                <thead id="comp-thead"></thead>
                                <tbody id="comp-tbody"></tbody>
                            </table>
                        </div>
                        <div class="empty-result" id="comp-empty">暂无匹配数据</div>
                    </div>

                    <div class="pagination" id="comp-pagination" style="display:none;"></div>
                </div>
            </div>
            {% endblock %}
        </main>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
