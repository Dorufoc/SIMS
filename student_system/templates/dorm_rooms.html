<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'dorm' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>宿舍管理</h1>
                        <div>
                            <button class="btn btn-success" onclick="location.href='/dorm_assignments'">住宿分配</button>
                            <button class="btn btn-primary" onclick="openModal()">新增宿舍</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>楼栋</th>
                                    <th>房间号</th>
                                    <th>容量</th>
                                    <th>已住</th>
                                    <th>入住率</th>
                                    <th>性别限制</th>
                                    <th>联系电话</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="roomTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="roomModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增宿舍</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="roomForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="roomId">
                <div class="form-group">
                    <label>楼栋 *</label>
                    <input type="text" id="building" required placeholder="如：A栋">
                </div>
                <div class="form-group">
                    <label>房间号 *</label>
                    <input type="text" id="roomNumber" required placeholder="如：101">
                </div>
                <div class="form-group">
                    <label>容量(床位数) *</label>
                    <input type="number" id="capacity" min="1" max="8" value="4" required>
                </div>
                <div class="form-group">
                    <label>性别限制</label>
                    <select id="genderLimit">
                        <option value="不限">不限</option>
                        <option value="男">男生</option>
                        <option value="女">女生</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>房间电话</label>
                    <input type="text" id="phone">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let buildings = [];

        // 加载楼栋列表
        function loadBuildings() {
            fetch('/api/dorm_buildings')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        buildings = data.data;
                    }
                });
        }

        // 加载宿舍列表
        function loadRooms(page = 1) {
            currentPage = page;
            let url = `/api/dorm_rooms?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('roomTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(room => {
                const occupied = room.occupied || 0;
                const capacity = room.capacity;
                const rate = Math.round((occupied / capacity) * 100);
                let fillClass = '';
                if (rate >= 100) fillClass = 'high';
                else if (rate >= 75) fillClass = 'medium';

                return `
                    <tr>
                        <td>${room.building}</td>
                        <td>${room.room_number}</td>
                        <td>${capacity}</td>
                        <td>${occupied}</td>
                        <td>
                            <div class="occupancy-bar">
                                <div class="occupancy-fill ${fillClass}"></div>
                            </div>
                            <small>${rate}%</small>
                        </td>
                        <td>${room.gender_limit || '不限'}</td>
                        <td>${room.phone || '-'}</td>
                        <td class="actions">
                            <button class="btn btn-warning" onclick="editRoom(${room.room_id})">编辑</button>
                            <button class="btn btn-danger" onclick="deleteRoom(${room.room_id}, '${room.building}${room.room_number}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="loadRooms(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadRooms(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadRooms(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        // 打开模态框
        function openModal() {
            document.getElementById('roomModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增宿舍';
            document.getElementById('roomForm').reset();
            document.getElementById('roomId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('roomModal').classList.remove('active');
        }

        // 编辑宿舍
        function editRoom(id) {
            fetch(`/api/dorm_rooms/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const room = data.data;
                        document.getElementById('roomModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑宿舍';
                        document.getElementById('roomId').value = room.room_id;
                        document.getElementById('building').value = room.building;
                        document.getElementById('roomNumber').value = room.room_number;
                        document.getElementById('capacity').value = room.capacity;
                        document.getElementById('genderLimit').value = room.gender_limit || '不限';
                        document.getElementById('phone').value = room.phone || '';
                    }
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('roomId').value;
            const data = {
                building: document.getElementById('building').value,
                room_number: document.getElementById('roomNumber').value,
                capacity: parseInt(document.getElementById('capacity').value),
                gender_limit: document.getElementById('genderLimit').value,
                phone: document.getElementById('phone').value
            };

            const url = id ? `/api/dorm_rooms/${id}` : '/api/dorm_rooms';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadRooms(currentPage);
                    loadBuildings();
                }
            });
        }

        // 删除宿舍
        function deleteRoom(id, name) {
            if (!confirm(`确定要删除宿舍 "${name}" 吗？`)) return;

            fetch(`/api/dorm_rooms/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadRooms(currentPage);
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }
    </script>

    <script>
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'building', label: '楼栋', type: 'text'},
                {name: 'room_number', label: '房间号', type: 'text'},
                {name: 'capacity', label: '容量', type: 'number'},
                {name: 'occupied', label: '已住', type: 'number'},
                {name: 'gender_limit', label: '性别限制', type: 'select', options: ['男', '女', '不限']},
                {name: 'phone', label: '联系电话', type: 'text'}
            ],
            onApply: function(filters) { loadRooms(1); },
            onReset: function(filters) { loadRooms(1); }
        });
        loadBuildings();
        loadRooms();
    </script>
</body>
</html>
