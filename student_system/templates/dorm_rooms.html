<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'dorm' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>宿舍管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openModal()">新增宿舍</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th data-sort="building">楼栋</th>
                                    <th data-sort="room_number">房间号</th>
                                    <th data-sort="capacity">容量</th>
                                    <th data-sort="occupied">已住</th>
                                    <th>入住率</th>
                                    <th data-sort="gender_limit">性别限制</th>
                                    <th data-sort="phone">联系电话</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="roomTable">
                                <tr><td colspan="9" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="roomModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增宿舍</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="roomForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="roomId">
                <div class="form-group">
                    <label>楼栋 *</label>
                    <input type="text" id="building" required placeholder="如：A栋">
                </div>
                <div class="form-group">
                    <label>房间号 *</label>
                    <input type="text" id="roomNumber" required placeholder="如：101">
                </div>
                <div class="form-group">
                    <label>容量(床位数) *</label>
                    <input type="number" id="capacity" min="1" max="8" value="4" required>
                </div>
                <div class="form-group">
                    <label>性别限制</label>
                    <select id="genderLimit">
                        <option value="不限">不限</option>
                        <option value="M">男生</option>
                        <option value="F">女生</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>房间电话</label>
                    <input type="text" id="phone">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        let buildings = [];

        // 加载楼栋列表
        function loadBuildings() {
            fetch('/api/dorm_buildings')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        buildings = data.data;
                    }
                });
        }

        // 加载宿舍列表
        function loadRooms(page = 1) {
            let url = `/api/dorm_rooms?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('roomTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 9;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(room, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                const occupied = room.occupied || 0;
                const capacity = room.capacity;
                const rate = Math.round((occupied / capacity) * 100);
                let fillClass = '';
                if (rate >= 100) fillClass = 'high';
                else if (rate >= 75) fillClass = 'medium';

                const tr = document.createElement('tr');

                var limitText = room.gender_limit === 'M' ? '男' : (room.gender_limit === 'F' ? '女' : (room.gender_limit || '不限'));

                var cells = [rowIdx, room.building, room.room_number, capacity, occupied, rate + '%', limitText, room.phone || '-'];
                for (var ci = 0; ci < cells.length; ci++) {
                    var td = document.createElement('td');
                    if (ci === 5) {
                        // 入住率列 - keep occupancy bar for rate
                        const bar = document.createElement('div');
                        bar.className = 'occupancy-bar';
                        const fill = document.createElement('div');
                        fill.className = 'occupancy-fill ' + fillClass;
                        bar.appendChild(fill);
                        td.appendChild(bar);
                        const small = document.createElement('small');
                        small.textContent = rate + '%';
                        td.appendChild(small);
                    } else {
                        td.textContent = String(cells[ci]);
                    }
                    tr.appendChild(td);
                }

                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-sm btn-primary';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editRoom(room.room_id); };
                tdActions.appendChild(btnEdit);

                tdActions.appendChild(document.createTextNode(' '));

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-sm btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteRoom(room.room_id, room.building + room.room_number); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 打开模态框
        function openModal() {
            document.getElementById('roomModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增宿舍';
            document.getElementById('roomForm').reset();
            document.getElementById('roomId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('roomModal').classList.remove('active');
        }

        // 编辑宿舍
        function editRoom(id) {
            fetch(`/api/dorm_rooms/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const room = data.data;
                        document.getElementById('roomModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑宿舍';
                        document.getElementById('roomId').value = room.room_id;
                        document.getElementById('building').value = room.building;
                        document.getElementById('roomNumber').value = room.room_number;
                        document.getElementById('capacity').value = room.capacity;
                        document.getElementById('genderLimit').value = room.gender_limit || '不限';
                        document.getElementById('phone').value = room.phone || '';
                    }
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('roomId').value;
            const data = {
                building: document.getElementById('building').value,
                room_number: document.getElementById('roomNumber').value,
                capacity: parseInt(document.getElementById('capacity').value),
                gender_limit: document.getElementById('genderLimit').value,
                phone: document.getElementById('phone').value
            };

            const url = id ? `/api/dorm_rooms/${id}` : '/api/dorm_rooms';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadRooms(pager.currentPage);
                    loadBuildings();
                }
            });
        }

        // 删除宿舍
        function deleteRoom(id, name) {
            if (!confirm(`确定要删除宿舍 "${name}" 吗？`)) return;

            fetch(`/api/dorm_rooms/${id}`, { method: 'DELETE', headers: { 'X-CSRF-Token': _csrf_token } })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadRooms(pager.currentPage);
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }
    </script>

    <script>
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'building', label: '楼栋', type: 'text'},
                {name: 'room_number', label: '房间号', type: 'text'},
                {name: 'capacity', label: '容量', type: 'number'},
                {name: 'occupied', label: '已住', type: 'number'},
                {name: 'gender_limit', label: '性别限制', type: 'select', options: [{value: 'M', label: '男'}, {value: 'F', label: '女'}, {value: '不限', label: '不限'}]},
                {name: 'phone', label: '联系电话', type: 'text'}
            ],
            onApply: function(filters) { loadRooms(1); },
            onReset: function(filters) { loadRooms(1); }
        });
        loadBuildings();
        loadRooms();

        initSortableTable({
            tableId: 'roomTable',
            onSort: function(sort) {
                currentSort = sort;
                loadRooms(1);
            }
        });

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadRooms(page); }
        });

        initBatchImport({
            entityType: 'dorm_room',
            previewColumns: ['楼栋', '房间号', '容量', '性别限制'],
            requiredFieldIndex: 0,
            requiredFieldName: '楼栋',
            onImportSuccess: function() { loadRooms(1); }
        });
    </script>
</body>
</html>
