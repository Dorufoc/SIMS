<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生信息管理系统 - 注册</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        body {
            background: url('/static/img/bg.png') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>学生信息管理系统</h1>
        <div class="error-msg" id="error-msg" style="display:none;"></div>
        <form id="register-form">
            <div class="form-group" id="register-value-group">
                <label for="register_value">学号</label>
                <input type="text" id="register_value" name="register_value" placeholder="请输入学号" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="real_name">真实姓名</label>
                <input type="text" id="real_name" name="real_name" placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label>身份</label>
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="student" checked>
                        <span>学生</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="teacher">
                        <span>教职工</span>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn-primary">注 册</button>
        </form>
        <div class="register-footer">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>

    <div class="loading-overlay" id="loading-overlay"><div class="loading-spinner"></div></div>

    <script src="/static/js/main.js"></script>
    <script>
        var register_form = document.getElementById('register-form');
        var error_msg = document.getElementById('error-msg');

        function show_error(msg) {
            error_msg.textContent = msg;
            error_msg.style.display = 'block';
        }

        function hide_error() {
            error_msg.style.display = 'none';
        }

        // 角色切换 - 更新注册值标签
        var roleOptions = document.querySelectorAll('input[name="role"]');
        var registerValueLabel = document.querySelector('#register-value-group label');
        var registerValueInput = document.getElementById('register_value');

        roleOptions.forEach(function(radio) {
            radio.addEventListener('change', function() {
                if (this.value === 'teacher') {
                    registerValueLabel.textContent = '工号';
                    registerValueInput.placeholder = '请输入工号';
                } else {
                    registerValueLabel.textContent = '学号';
                    registerValueInput.placeholder = '请输入学号';
                }
            });
        });

        register_form.addEventListener('submit', function(e) {
            e.preventDefault();
            hide_error();

            var register_value = registerValueInput.value.trim();
            var password = document.getElementById('password').value.trim();
            var real_name = document.getElementById('real_name').value.trim();

            if (!register_value) {
                alert('请输入注册信息');
                return;
            }
            if (!password) {
                alert('密码不能为空');
                return;
            }
            if (!real_name) {
                alert('真实姓名不能为空');
                return;
            }

            var role = document.querySelector('input[name="role"]:checked').value;

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/register', true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.setRequestHeader('X-CSRF-Token', _csrf_token);

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    hide_loading();
                    if (xhr.status === 200) {
                        var res = JSON.parse(xhr.responseText);
                        if (res.code === 0) {
                            // 注册成功，自动登录
                            if (res.need_set_username) {
                                // 非管理员，需要先设置用户名
                                window.location.href = '/set-username?force=1';
                            } else {
                                window.location.href = res.redirect_url || '/my';
                            }
                        } else {
                            show_error(res.msg);
                        }
                    } else {
                        show_error('请求失败，请稍后重试');
                    }
                }
            };

            xhr.send('register_method=ref_id'
                + '&register_value=' + encodeURIComponent(register_value)
                + '&password=' + encodeURIComponent(password)
                + '&real_name=' + encodeURIComponent(real_name)
                + '&role=' + encodeURIComponent(role));
            show_loading();
        });
    </script>
</body>
</html>
