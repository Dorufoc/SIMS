{% set active_page = 'dorm' %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住宿分配 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="container admin-container">
                    <div class="page-header">
            <h1>住宿分配</h1>
            <div>
                <button class="btn btn-success" onclick="location.href='/dorm_rooms'">宿舍管理</button>
                <button class="btn btn-primary" onclick="openModal()">分配宿舍</button>
            </div>
        </div>

        <!-- 批量导入导出 -->
        {% include '_batch_import.html' %}

        <div id="filterModule" class="filter-builder">
            <div class="filter-builder-header">
                <h3>筛选条件</h3>
                <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
            </div>
            <div class="filter-rows-container">
                <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
            </div>
            <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                <button class="btn btn-primary btn-apply-filters">查询</button>
                <button class="btn btn-secondary btn-reset-filters">重置</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>楼栋</th>
                    <th>房间号</th>
                    <th>床位号</th>
                    <th>入住日期</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="assignmentTable">
                <!-- 数据将通过JS加载 -->
            </tbody>
        </table>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 分配宿舍模态框 -->
    <div id="assignModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>分配宿舍</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="assignForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>学号 *</label>
                    <input type="text" id="studentId" required placeholder="请输入学生学号">
                </div>
                <div class="form-group">
                    <label>房间 *</label>
                    <select id="roomId" required onchange="updateAvailableBeds()">
                        <option value="">请选择房间</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>床位号</label>
                    <input type="text" id="bedNumber" placeholder="如：1号床">
                </div>
                <div class="form-group">
                    <label>入住日期</label>
                    <input type="date" id="checkInDate">
                </div>
                <button type="submit" class="btn btn-primary">确认分配</button>
            </form>
        </div>
    </div>

    <!-- 退宿模态框 -->
    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>退宿确认</h2>
                <span class="close" onclick="closeCheckoutModal()">&times;</span>
            </div>
            <form id="checkoutForm" onsubmit="handleCheckout(event)">
                <input type="hidden" id="checkoutAssignId">
                <div class="form-group">
                    <label>退宿日期</label>
                    <input type="date" id="checkOutDate">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="checkoutRemark" rows="3" placeholder="退宿原因等备注信息"></textarea>
                </div>
                <button type="submit" class="btn btn-warning">确认退宿</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;

        // 加载住宿分配列表
        function loadAssignments(page = 1) {
            currentPage = page;
            let url = `/api/dorm_assignments?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('assignmentTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach(assign => {
                const tr = document.createElement('tr');

                const tdStudent = document.createElement('td');
                tdStudent.textContent = assign.student_id;
                tr.appendChild(tdStudent);

                const tdName = document.createElement('td');
                tdName.textContent = assign.student_name;
                tr.appendChild(tdName);

                const tdGender = document.createElement('td');
                if (assign.gender === 'M') {
                    tdGender.textContent = '男';
                } else if (assign.gender === 'F') {
                    tdGender.textContent = '女';
                } else {
                    tdGender.textContent = assign.gender || '-';
                }
                tr.appendChild(tdGender);

                const tdBuilding = document.createElement('td');
                tdBuilding.textContent = assign.building;
                tr.appendChild(tdBuilding);

                const tdRoom = document.createElement('td');
                tdRoom.textContent = assign.room_number;
                tr.appendChild(tdRoom);

                const tdBed = document.createElement('td');
                tdBed.textContent = assign.bed_number || '-';
                tr.appendChild(tdBed);

                const tdDate = document.createElement('td');
                tdDate.textContent = assign.check_in_date || '-';
                tr.appendChild(tdDate);

                const tdStatus = document.createElement('td');
                const statusSpan = document.createElement('span');
                statusSpan.className = assign.status === '在住' ? 'status-active' : 'status-inactive';
                statusSpan.textContent = assign.status;
                tdStatus.appendChild(statusSpan);
                tr.appendChild(tdStatus);

                const tdActions = document.createElement('td');
                tdActions.className = 'actions';
                if (assign.status === '在住') {
                    const btnCheckout = document.createElement('button');
                    btnCheckout.className = 'btn btn-warning';
                    btnCheckout.textContent = '退宿';
                    btnCheckout.onclick = function() { openCheckoutModal(assign.assign_id); };
                    tdActions.appendChild(btnCheckout);
                } else {
                    const spanDone = document.createElement('span');
                    spanDone.textContent = '已退';
                    tdActions.appendChild(spanDone);
                }
                tr.appendChild(tdActions);

                tbody.appendChild(tr);
            });
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="loadAssignments(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadAssignments(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadAssignments(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        // 加载有空床位的房间
        function loadAvailableRooms() {
            fetch('/api/dorm_rooms/available')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const select = document.getElementById('roomId');
                        const options = data.data.map(room => 
                            `<option value="${room.room_id}">${room.building} ${room.room_number} (空${room.available_beds}床)</option>`
                        ).join('');
                        select.innerHTML = '<option value="">请选择房间</option>' + options;
                    }
                });
        }

        // 打开分配模态框
        function openModal() {
            document.getElementById('assignModal').classList.add('active');
            document.getElementById('assignForm').reset();
            loadAvailableRooms();
        }

        // 关闭分配模态框
        function closeModal() {
            document.getElementById('assignModal').classList.remove('active');
        }

        // 打开退宿模态框
        function openCheckoutModal(assignId) {
            document.getElementById('checkoutModal').classList.add('active');
            document.getElementById('checkoutAssignId').value = assignId;
            document.getElementById('checkoutForm').reset();
        }

        // 关闭退宿模态框
        function closeCheckoutModal() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        // 提交分配
        function handleSubmit(e) {
            e.preventDefault();
            const data = {
                student_id: document.getElementById('studentId').value,
                room_id: parseInt(document.getElementById('roomId').value),
                bed_number: document.getElementById('bedNumber').value,
                check_in_date: document.getElementById('checkInDate').value
            };

            fetch('/api/dorm_assignments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadAssignments(currentPage);
                }
            });
        }

        // 提交退宿
        function handleCheckout(e) {
            e.preventDefault();
            const assignId = document.getElementById('checkoutAssignId').value;
            const data = {
                check_out_date: document.getElementById('checkOutDate').value,
                remark: document.getElementById('checkoutRemark').value
            };

            fetch(`/api/dorm_assignments/${assignId}/checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeCheckoutModal();
                    loadAssignments(currentPage);
                }
            });
        }

        // 点击模态框外部关闭
        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
                closeCheckoutModal();
            }
        }
    </script>

    <script>
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'student_id', label: '学号', type: 'text'},
                {name: 'student_name', label: '姓名', type: 'text'},
                {name: 'gender', label: '性别', type: 'select', options: ['M', 'F']},
                {name: 'building', label: '楼栋', type: 'text'},
                {name: 'room_number', label: '房间号', type: 'text'},
                {name: 'bed_number', label: '床位号', type: 'text'},
                {name: 'check_in_date', label: '入住日期', type: 'text'},
                {name: 'status', label: '状态', type: 'select', options: ['在住', '已退']}
            ],
            onApply: function(filters) { loadAssignments(1); },
            onReset: function(filters) { loadAssignments(1); }
        });
        loadAssignments();

        initBatchImport({
            entityType: 'dorm_assignment',
            previewColumns: ['学号', '房间编号', '床位号', '入住日期', '状态'],
            requiredFieldIndex: 0,
            requiredFieldName: '学号',
            onImportSuccess: function() { loadAssignments(1); }
        });
    </script>
</body>
</html>
