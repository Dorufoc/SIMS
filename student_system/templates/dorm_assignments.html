{% set active_page = 'dorm_assignments' %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住宿分配 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>住宿分配</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openModal()">分配宿舍</button>
                        </div>
                    </div>

        <div id="filterModule" class="filter-builder">
            <div class="filter-builder-header">
                <h3>筛选条件</h3>
                <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
            </div>
            <div class="filter-rows-container">
                <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
            </div>
            <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                <button class="btn btn-primary btn-apply-filters">查询</button>
                <button class="btn btn-secondary btn-reset-filters">重置</button>
            </div>
        </div>

        <div class="permission-table-container">
            <table class="permission-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th data-sort="student_id">学号</th>
                        <th data-sort="student_name">姓名</th>
                        <th>性别</th>
                        <th data-sort="building">楼栋</th>
                        <th data-sort="room_number">房间号</th>
                        <th data-sort="bed_number">床位号</th>
                        <th data-sort="check_in_date">入住日期</th>
                        <th data-sort="status">状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="assignmentTable">
                    <tr><td colspan="10" class="empty-row">加载中...</td></tr>
                </tbody>
            </table>
        </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 分配宿舍模态框 -->
    <div id="assignModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>分配宿舍</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="assignForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>学号 *</label>
                    <input type="text" id="studentId" required placeholder="请输入学生学号" oninput="filterRoomsByStudent(this.value)">
                </div>
                <div class="form-group">
                    <label>房间 *</label>
                    <select id="roomId" required>
                        <option value="">请选择房间</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>床位号</label>
                    <input type="text" id="bedNumber" placeholder="如：1号床">
                </div>
                <div class="form-group">
                    <label>入住日期</label>
                    <input type="date" id="checkInDate">
                </div>
                <button type="submit" class="btn btn-primary">确认分配</button>
            </form>
        </div>
    </div>

    <!-- 退宿模态框 -->
    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>退宿确认</h2>
                <span class="close" onclick="closeCheckoutModal()">&times;</span>
            </div>
            <form id="checkoutForm" onsubmit="handleCheckout(event)">
                <input type="hidden" id="checkoutAssignId">
                <div class="form-group">
                    <label>退宿日期</label>
                    <input type="date" id="checkOutDate">
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="checkoutRemark" rows="3" placeholder="退宿原因等备注信息"></textarea>
                </div>
                <button type="submit" class="btn btn-warning">确认退宿</button>
            </form>
        </div>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        var currentSort = { sort_by: '', sort_order: 'asc' };

        // 加载住宿分配列表
        function loadAssignments(page = 1) {
            let url = `/api/dorm_assignments?page=${page}&page_size=10`;
            if (currentSort.sort_by) {
                url += '&sort_by=' + encodeURIComponent(currentSort.sort_by) + '&sort_order=' + encodeURIComponent(currentSort.sort_order);
            }
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('assignmentTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                const emptyTr = document.createElement('tr');
                const emptyTd = document.createElement('td');
                emptyTd.colSpan = 10;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(assign, i) {
                const tr = document.createElement('tr');
                const rowIdx = (pager.currentPage - 1) * 10 + i + 1;

                const tdIndex = document.createElement('td');
                tdIndex.textContent = rowIdx;
                tr.appendChild(tdIndex);

                const tdStudent = document.createElement('td');
                tdStudent.textContent = assign.student_id;
                tr.appendChild(tdStudent);

                const tdName = document.createElement('td');
                tdName.textContent = assign.student_name;
                tr.appendChild(tdName);

                const tdGender = document.createElement('td');
                if (assign.gender === 'M') {
                    tdGender.textContent = '男';
                } else if (assign.gender === 'F') {
                    tdGender.textContent = '女';
                } else {
                    tdGender.textContent = assign.gender || '-';
                }
                tr.appendChild(tdGender);

                const tdBuilding = document.createElement('td');
                tdBuilding.textContent = assign.building;
                tr.appendChild(tdBuilding);

                const tdRoom = document.createElement('td');
                tdRoom.textContent = assign.room_number;
                tr.appendChild(tdRoom);

                const tdBed = document.createElement('td');
                tdBed.textContent = assign.bed_number || '-';
                tr.appendChild(tdBed);

                const tdDate = document.createElement('td');
                tdDate.textContent = assign.check_in_date || '-';
                tr.appendChild(tdDate);

                const tdStatus = document.createElement('td');
                const statusSpan = document.createElement('span');
                statusSpan.className = assign.status === '在住' ? 'status-active' : 'status-inactive';
                statusSpan.textContent = assign.status;
                tdStatus.appendChild(statusSpan);
                tr.appendChild(tdStatus);

                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';
                if (assign.status === '在住') {
                    const btnCheckout = document.createElement('button');
                    btnCheckout.className = 'btn btn-sm btn-danger';
                    btnCheckout.textContent = '退宿';
                    btnCheckout.onclick = function() { openCheckoutModal(assign.assign_id); };
                    tdActions.appendChild(btnCheckout);
                } else {
                    const spanDone = document.createElement('span');
                    spanDone.textContent = '已退';
                    tdActions.appendChild(spanDone);
                }
                tr.appendChild(tdActions);

                tbody.appendChild(tr);
            });
        }

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadAssignments(page); }
        });

        // 存储所有可用房间（含 gender_limit）
        var availableRooms = [];

        // 加载有空床位的房间
        function loadAvailableRooms() {
            fetch('/api/dorm_rooms/available')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        availableRooms = data.data;
                        // 初始时显示所有房间
                        populateRoomSelect(availableRooms);
                    }
                });
        }

        // 填充房间下拉菜单
        function populateRoomSelect(rooms) {
            const select = document.getElementById('roomId');
            if (rooms.length === 0) {
                select.innerHTML = '<option value="">无符合条件的房间</option>';
                return;
            }
            const options = rooms.map(room => 
                `<option value="${room.room_id}">${room.building} ${room.room_number} (空${room.available_beds}床)</option>`
            ).join('');
            select.innerHTML = '<option value="">请选择房间</option>' + options;
        }

        // 根据学号查性别并过滤房间
        function filterRoomsByStudent(studentId) {
            if (!studentId) {
                populateRoomSelect(availableRooms);
                return;
            }
            fetch(`/api/students/${encodeURIComponent(studentId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const gender = data.data.gender; // M 或 F
                        const filtered = availableRooms.filter(room =>
                            room.gender_limit === '不限' || room.gender_limit === gender
                        );
                        populateRoomSelect(filtered);
                    } else {
                        // 学生不存在，显示所有房间
                        populateRoomSelect(availableRooms);
                    }
                })
                .catch(() => {
                    populateRoomSelect(availableRooms);
                });
        }

        // 打开分配模态框
        function openModal() {
            document.getElementById('assignModal').classList.add('active');
            document.getElementById('assignForm').reset();
            loadAvailableRooms();
        }

        // 关闭分配模态框
        function closeModal() {
            document.getElementById('assignModal').classList.remove('active');
        }

        // 打开退宿模态框
        function openCheckoutModal(assignId) {
            document.getElementById('checkoutModal').classList.add('active');
            document.getElementById('checkoutAssignId').value = assignId;
            document.getElementById('checkoutForm').reset();
        }

        // 关闭退宿模态框
        function closeCheckoutModal() {
            document.getElementById('checkoutModal').classList.remove('active');
        }

        // 提交分配
        function handleSubmit(e) {
            e.preventDefault();
            const data = {
                student_id: document.getElementById('studentId').value,
                room_id: parseInt(document.getElementById('roomId').value),
                bed_number: document.getElementById('bedNumber').value,
                check_in_date: document.getElementById('checkInDate').value
            };

            fetch('/api/dorm_assignments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadAssignments(pager.currentPage);
                }
            });
        }

        // 提交退宿
        function handleCheckout(e) {
            e.preventDefault();
            const assignId = document.getElementById('checkoutAssignId').value;
            const data = {
                check_out_date: document.getElementById('checkOutDate').value,
                remark: document.getElementById('checkoutRemark').value
            };

            fetch(`/api/dorm_assignments/${assignId}/checkout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeCheckoutModal();
                    loadAssignments(pager.currentPage);
                }
            });
        }

        // 点击模态框外部关闭
        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
                closeCheckoutModal();
            }
        }
    </script>

    <script>
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'student_id', label: '学号', type: 'text'},
                {name: 'student_name', label: '姓名', type: 'text'},
                {name: 'gender', label: '性别', type: 'select', options: [{value: 'M', label: '男'}, {value: 'F', label: '女'}]},
                {name: 'building', label: '楼栋', type: 'text'},
                {name: 'room_number', label: '房间号', type: 'text'},
                {name: 'bed_number', label: '床位号', type: 'text'},
                {name: 'check_in_date', label: '入住日期', type: 'text'},
                {name: 'status', label: '状态', type: 'select', options: ['在住', '已退']}
            ],
            onApply: function(filters) { loadAssignments(1); },
            onReset: function(filters) { loadAssignments(1); }
        });
        loadAssignments();

        initSortableTable({
            tableId: 'assignmentTable',
            onSort: function(sort) {
                currentSort = sort;
                loadAssignments(1);
            }
        });

        initBatchImport({
            entityType: 'dorm_assignment',
            previewColumns: ['学号', '房间编号', '床位号', '入住日期', '状态'],
            requiredFieldIndex: 0,
            requiredFieldName: '学号',
            onImportSuccess: function() { loadAssignments(1); }
        });
    </script>
</body>
</html>
