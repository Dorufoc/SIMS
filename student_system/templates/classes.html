<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'classes' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>班级管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openModal()">新增班级</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th data-sort="class_id">班级编号</th>
                                <th data-sort="class_name">班级名称</th>
                                <th data-sort="major_name">所属专业</th>
                                <th>所属院系</th>
                                <th data-sort="enrollment_year">入学年份</th>
                                <th data-sort="student_count">学生人数</th>
                                <th data-sort="advisor">辅导员</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                            <tbody id="classTable">
                                <tr><td colspan="9" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="classModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增班级</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="classForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="classId">
                <div class="form-group">
                    <label>所属专业 *</label>
                    <select id="majorId" required>
                        <option value="">请选择专业</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>班级名称 *</label>
                    <input type="text" id="className" required placeholder="如：计算机科学与技术1班">
                </div>
                <div class="form-group">
                    <label>入学年份 *</label>
                    <input type="number" id="enrollmentYear" required min="2000" max="2099">
                </div>
                <div class="form-group">
                    <label>辅导员</label>
                    <select id="counselor">
                        <option value="">请选择辅导员</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        let majors = [];
        let currentSort = { sort_by: '', sort_order: 'asc' };

        // 加载辅导员列表（职称是辅导员的教师）
        function loadCounselors() {
            fetch('/api/teachers/counselors')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const counselorSelect = document.getElementById('counselor');
                        const options = data.data.map(t => `<option value="${t.teacher_id}">${t.name}</option>`).join('');
                        counselorSelect.innerHTML = '<option value="">请选择辅导员</option>' + options;
                    }
                })
                .catch(function(err) {
                    console.error('加载辅导员列表失败:', err);
                });
        }

        // 加载专业列表
        function loadMajors() {
            fetch('/api/majors?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        majors = data.data;
                        const majorSelect = document.getElementById('majorId');
                        const options = majors.map(m => `<option value="${m.major_id}">${m.major_name}</option>`).join('');
                        majorSelect.innerHTML = '<option value="">请选择专业</option>' + options;
                    }
                })
                .catch(function(err) {
                    console.error('加载专业列表失败:', err);
                });
        }

        // 渲染错误状态
        function renderError(message) {
            const tbody = document.getElementById('classTable');
            tbody.innerHTML = '';
            var tr = document.createElement('tr');
            var td = document.createElement('td');
            td.colSpan = 9;
            td.className = 'empty-row';
            td.textContent = message || '加载失败，请稍后重试';
            td.style.color = '#e53e3e';
            tr.appendChild(td);
            tbody.appendChild(tr);
        }

        // 加载班级列表
        function loadClasses(page = 1) {
            let url = `/api/classes?page=${page}&page_size=10`;
            if (currentSort.sort_by) {
                url += '&sort_by=' + encodeURIComponent(currentSort.sort_by) + '&sort_order=' + encodeURIComponent(currentSort.sort_order);
            }
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    } else {
                        renderError(data.msg || '加载失败，请稍后重试');
                    }
                })
                .catch(function(err) {
                    console.error('加载班级列表失败:', err);
                    renderError('网络错误，无法加载数据');
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('classTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 9;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(cls, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                const tr = document.createElement('tr');

                var majorName = cls.major_name || '-';
                var advisorDisplay = cls.advisor_name || cls.advisor || '-';
                var cells = [rowIdx, cls.class_id, cls.class_name, majorName, cls.dept_name || '-', cls.enrollment_year, cls.student_count || 0, advisorDisplay];
                for (var ci = 0; ci < cells.length; ci++) {
                    var td = document.createElement('td');
                    td.textContent = String(cells[ci]);
                    if (ci === 3 && cls.major_name) td.style.color = '#2b6cb0';
                    if (ci === 4 && cls.dept_name) td.style.color = '#2b6cb0';
                    tr.appendChild(td);
                }

                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-sm btn-primary';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editClass(cls.class_id); };
                tdActions.appendChild(btnEdit);

                tdActions.appendChild(document.createTextNode(' '));

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-sm btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteClass(cls.class_id, cls.class_name); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 打开模态框
        function openModal() {
            document.getElementById('classModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增班级';
            document.getElementById('classForm').reset();
            document.getElementById('classId').value = '';
            document.getElementById('enrollmentYear').value = new Date().getFullYear();
            loadCounselors();
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('classModal').classList.remove('active');
        }

        // 编辑班级
        function editClass(id) {
            loadCounselors();
            fetch(`/api/classes/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const cls = data.data;
                        document.getElementById('classModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑班级';
                        document.getElementById('classId').value = cls.class_id;
                        document.getElementById('majorId').value = cls.major_id;
                        document.getElementById('className').value = cls.class_name;
                        document.getElementById('enrollmentYear').value = cls.enrollment_year;
                        document.getElementById('counselor').value = cls.advisor || '';
                    } else {
                        alert(data.msg || '获取班级信息失败');
                    }
                })
                .catch(function(err) {
                    console.error('获取班级详情失败:', err);
                    alert('网络错误，无法获取班级信息');
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('classId').value;
            const data = {
                major_id: parseInt(document.getElementById('majorId').value),
                class_name: document.getElementById('className').value,
                enrollment_year: parseInt(document.getElementById('enrollmentYear').value),
                advisor: document.getElementById('counselor').value
            };

            const url = id ? `/api/classes/${id}` : '/api/classes';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadClasses(pager.currentPage);
                }
            })
            .catch(function(err) {
                console.error('提交表单失败:', err);
                alert('网络错误，操作失败');
            });
        }

        // 删除班级
        function deleteClass(id, name) {
            if (!confirm(`确定要删除班级 "${name}" 吗？`)) return;

            fetch(`/api/classes/${id}`, { method: 'DELETE', headers: { 'X-CSRF-Token': _csrf_token } })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadClasses(pager.currentPage);
                })
                .catch(function(err) {
                    console.error('删除班级失败:', err);
                    alert('网络错误，删除失败');
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'class_id', label: '班级编号', type: 'string'},
                {name: 'class_name', label: '班级名称', type: 'text'},
                {name: 'major_name', label: '所属专业', type: 'text'},
                {name: 'dept_name', label: '所属院系', type: 'text'},
                {name: 'enrollment_year', label: '入学年份', type: 'number'},
                {name: 'student_count', label: '学生人数', type: 'number'},
                {name: 'advisor', label: '辅导员', type: 'text'}
            ],
            onApply: function(filters) { loadClasses(1); },
            onReset: function(filters) { loadClasses(1); }
        });
        loadMajors();
        loadClasses();

        initSortableTable({
            tableId: 'classTable',
            onSort: function(sort) {
                currentSort = sort;
                loadClasses(1);
            }
        });

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadClasses(page); }
        });

        initBatchImport({
            entityType: 'class',
            previewColumns: ['班级名称', '所属专业编号', '入学年份', '辅导员'],
            requiredFieldIndex: 0,
            requiredFieldName: '班级名称',
            onImportSuccess: function() { loadClasses(1); }
        });
    </script>
</body>
</html>
