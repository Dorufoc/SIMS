<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'classes' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>班级管理</h1>
                        <button class="btn btn-primary" onclick="openModal()">新增班级</button>
                    </div>

                    <!-- 批量导入导出 -->
                    {% include '_batch_import.html' %}

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>班级编号</th>
                                    <th>班级名称</th>
                                    <th>所属专业</th>
                                    <th>入学年份</th>
                                    <th>学生人数</th>
                                    <th>辅导员</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="classTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="classModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增班级</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="classForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="classId">
                <div class="form-group">
                    <label>所属专业 *</label>
                    <select id="majorId" required>
                        <option value="">请选择专业</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>班级名称 *</label>
                    <input type="text" id="className" required placeholder="如：计算机科学与技术1班">
                </div>
                <div class="form-group">
                    <label>入学年份 *</label>
                    <input type="number" id="enrollmentYear" required min="2000" max="2099">
                </div>
                <div class="form-group">
                    <label>辅导员</label>
                    <input type="text" id="counselor">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let majors = [];

        // 加载专业列表
        function loadMajors() {
            fetch('/api/majors?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        majors = data.data;
                        const majorSelect = document.getElementById('majorId');
                        const options = majors.map(m => `<option value="${m.major_id}">${m.major_name}</option>`).join('');
                        majorSelect.innerHTML = '<option value="">请选择专业</option>' + options;
                    }
                });
        }

        // 加载班级列表
        function loadClasses(page = 1) {
            currentPage = page;
            let url = `/api/classes?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('classTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach(cls => {
                const major = majors.find(m => m.major_id === cls.major_id);

                const tr = document.createElement('tr');

                const tdId = document.createElement('td');
                tdId.textContent = cls.class_id;
                tr.appendChild(tdId);

                const tdName = document.createElement('td');
                tdName.textContent = cls.class_name;
                tr.appendChild(tdName);

                const tdMajor = document.createElement('td');
                tdMajor.textContent = major ? major.major_name : '-';
                tr.appendChild(tdMajor);

                const tdYear = document.createElement('td');
                tdYear.textContent = cls.enrollment_year;
                tr.appendChild(tdYear);

                const tdCount = document.createElement('td');
                tdCount.textContent = cls.student_count || 0;
                tr.appendChild(tdCount);

                const tdCounselor = document.createElement('td');
                tdCounselor.textContent = cls.counselor || '-';
                tr.appendChild(tdCounselor);

                const tdActions = document.createElement('td');
                tdActions.className = 'actions';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-warning';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editClass(cls.class_id); };
                tdActions.appendChild(btnEdit);

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteClass(cls.class_id, cls.class_name); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="loadClasses(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadClasses(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadClasses(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        // 打开模态框
        function openModal() {
            document.getElementById('classModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增班级';
            document.getElementById('classForm').reset();
            document.getElementById('classId').value = '';
            document.getElementById('enrollmentYear').value = new Date().getFullYear();
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('classModal').classList.remove('active');
        }

        // 编辑班级
        function editClass(id) {
            fetch(`/api/classes/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const cls = data.data;
                        document.getElementById('classModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑班级';
                        document.getElementById('classId').value = cls.class_id;
                        document.getElementById('majorId').value = cls.major_id;
                        document.getElementById('className').value = cls.class_name;
                        document.getElementById('enrollmentYear').value = cls.enrollment_year;
                        document.getElementById('counselor').value = cls.counselor || '';
                    }
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('classId').value;
            const data = {
                major_id: parseInt(document.getElementById('majorId').value),
                class_name: document.getElementById('className').value,
                enrollment_year: parseInt(document.getElementById('enrollmentYear').value),
                counselor: document.getElementById('counselor').value
            };

            const url = id ? `/api/classes/${id}` : '/api/classes';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadClasses(currentPage);
                }
            });
        }

        // 删除班级
        function deleteClass(id, name) {
            if (!confirm(`确定要删除班级 "${name}" 吗？`)) return;

            fetch(`/api/classes/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadClasses(currentPage);
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'class_id', label: '班级编号', type: 'number'},
                {name: 'class_name', label: '班级名称', type: 'text'},
                {name: 'major_name', label: '所属专业', type: 'text'},
                {name: 'dept_name', label: '所属院系', type: 'text'},
                {name: 'enrollment_year', label: '入学年份', type: 'number'},
                {name: 'student_count', label: '学生人数', type: 'number'},
                {name: 'counselor', label: '辅导员', type: 'text'}
            ],
            onApply: function(filters) { loadClasses(1); },
            onReset: function(filters) { loadClasses(1); }
        });
        loadMajors();
        loadClasses();

        initBatchImport({
            entityType: 'class',
            previewColumns: ['班级名称', '所属专业编号', '入学年份', '辅导员'],
            requiredFieldIndex: 0,
            requiredFieldName: '班级名称',
            onImportSuccess: function() { loadClasses(1); }
        });
    </script>

</body>
</html>
