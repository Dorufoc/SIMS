<!-- 统一侧边栏组件 -->
<!-- 使用前需设置 active_page 变量 -->
<aside class="sidebar" id="sidebar">
    <nav class="sidebar-menu">
        {% if offline_mode %}
        <div class="menu-section">系统</div>
        <a href="/settings" class="menu-item {% if active_page == 'settings' %}active{% endif %}"><span class="menu-text">系统设置</span></a>
        {% else %}
        <div class="menu-section">主菜单</div>
        <a href="/" class="menu-item {% if active_page == 'dashboard' %}active{% endif %}"><span class="menu-text">仪表盘</span></a>
        <a href="/manage" class="menu-item {% if active_page in ['manage', 'add_stu'] %}active{% endif %}"><span class="menu-text">学生管理</span></a>
        <a href="/teachers" class="menu-item {% if active_page == 'teachers' %}active{% endif %}"><span class="menu-text">教师管理</span></a>

        <div class="menu-divider"></div>
        <div class="menu-section">组织架构</div>
        <a href="/departments" class="menu-item {% if active_page == 'departments' %}active{% endif %}"><span class="menu-text">院系管理</span></a>
        <a href="/majors" class="menu-item {% if active_page == 'majors' %}active{% endif %}"><span class="menu-text">专业管理</span></a>
        <a href="/classes" class="menu-item {% if active_page == 'classes' %}active{% endif %}"><span class="menu-text">班级管理</span></a>

        <div class="menu-divider"></div>
        <div class="menu-section">教学管理</div>
        <a href="/courses" class="menu-item {% if active_page == 'courses' %}active{% endif %}"><span class="menu-text">课程管理</span></a>
        <a href="/classrooms" class="menu-item {% if active_page == 'classrooms' %}active{% endif %}"><span class="menu-text">教室管理</span></a>
        <a href="/teaching" class="menu-item {% if active_page == 'teaching' %}active{% endif %}"><span class="menu-text">授课管理</span></a>
        <a href="/semesters" class="menu-item {% if active_page == 'semesters' %}active{% endif %}"><span class="menu-text">学期管理</span></a>
        <a href="/enrollments" class="menu-item {% if active_page == 'enrollments' %}active{% endif %}"><span class="menu-text">选课管理</span></a>
        <a href="/grades" class="menu-item {% if active_page == 'grades' %}active{% endif %}"><span class="menu-text">成绩管理</span></a>

        <div class="menu-divider"></div>
        <div class="menu-section">学生服务</div>
        <a href="/payments" class="menu-item {% if active_page == 'payments' %}active{% endif %}"><span class="menu-text">缴费管理</span></a>
        <a href="/dorm_rooms" class="menu-item {% if active_page in ['dorm', 'dorm_rooms'] %}active{% endif %}"><span class="menu-text">宿舍房间</span></a>
        <a href="/dorm_assignments" class="menu-item {% if active_page == 'dorm_assignments' %}active{% endif %}"><span class="menu-text">住宿分配</span></a>
        <a href="/rewards" class="menu-item {% if active_page == 'rewards' %}active{% endif %}"><span class="menu-text">奖惩管理</span></a>

        <div class="menu-divider"></div>
        <div class="menu-section">数据与系统</div>
        <a href="/statistics" class="menu-item {% if active_page == 'statistics' %}active{% endif %}"><span class="menu-text">统计报表</span></a>
        <a href="/query" class="menu-item {% if active_page == 'query' %}active{% endif %}"><span class="menu-text">综合查询</span></a>
        <a href="/user_management" class="menu-item admin-only {% if active_page in ['user_management', 'permission'] %}active{% endif %}"><span class="menu-text">用户管理</span></a>
        <a href="/settings" class="menu-item admin-only {% if active_page == 'settings' %}active{% endif %}"><span class="menu-text">系统设置</span></a>
        {% endif %}
    </nav>
</aside>

<script>
document.addEventListener('DOMContentLoaded', function() {
    {% if not offline_mode %}
    // 从 cookie 获取角色信息来控制侧边栏显示
    var roleMeta = document.querySelector('meta[name="user-role"]');
    if (!roleMeta) return;
    var role = roleMeta.content;
    var adminItems = document.querySelectorAll('.admin-only');
    adminItems.forEach(function(el) { el.style.display = role === 'admin' ? '' : 'none'; });
    {% endif %}
});
</script>
