<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'user_management' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>用户管理</h1>
                        <button class="btn btn-primary" onclick="openCreateModal()">新增用户</button>
                    </div>

                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索用户名或关联ID..." onkeyup="handleSearch()">
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>用户ID</th>
                                    <th>UUID</th>
                                    <th>用户名</th>
                                    <th>角色</th>
                                    <th>关联ID</th>
                                    <th>最后登录</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 创建/编辑用户模态框 -->
    <div id="userModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增用户</h2>
                <button class="close" onclick="closeModal('userModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm" onsubmit="handleUserSubmit(event)">
                    <input type="hidden" id="userId">
                    <div class="form-group">
                        <label>用户名 *</label>
                        <input type="text" id="userName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>密码 <span id="passwordHint">(创建时必填)</span></label>
                        <input type="text" id="userPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>角色 *</label>
                        <select id="userRole" class="form-control" required>
                            <option value="student">学生</option>
                            <option value="teacher">教师</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>关联ID (学号/工号)</label>
                        <input type="text" id="userRefId" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('userModal')">取消</button>
                <button type="button" class="btn btn-primary" onclick="document.getElementById('userForm').dispatchEvent(new Event('submit'))">保存</button>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;

        // 加载用户列表
        function loadUsers(page = 1) {
            currentPage = page;
            let url = `/api/users?page=${page}&page_size=10`;
            const keyword = document.getElementById('searchInput').value;
            if (keyword) {
                url += `&keyword=${encodeURIComponent(keyword)}`;
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderUsers(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染用户列表
        function renderUsers(users) {
            const tbody = document.getElementById('userTable');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8">暂无用户</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => {
                let roleBadge = '';
                if (user.role === 'admin') {
                    roleBadge = '<span class="badge badge-admin">管理员</span>';
                } else if (user.role === 'teacher') {
                    roleBadge = '<span class="badge badge-teacher">教师</span>';
                } else {
                    roleBadge = '<span class="badge badge-student">学生</span>';
                }

                return `
                    <tr>
                        <td>${user.user_id}</td>
                        <td><code>${user.uuid.substring(0, 20)}...</code></td>
                        <td>${user.username}</td>
                        <td>${roleBadge}</td>
                        <td>${user.ref_id || '-'}</td>
                        <td>${user.last_login || '-'}</td>
                        <td>${user.created_at}</td>
                        <td class="actions">
                            <button class="btn btn-warning btn-sm" onclick="editUser(${user.user_id})">编辑</button>
                            <button class="btn btn-success btn-sm" onclick="editPermissions(${user.user_id}, '${user.username}')">权限</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.user_id}, '${user.username}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="loadUsers(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadUsers(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadUsers(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        // 搜索处理
        function handleSearch() {
            loadUsers(1);
        }

        // 打开创建模态框
        function openCreateModal() {
            document.getElementById('userModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增用户';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('passwordHint').textContent = '(创建时必填)';
        }

        // 编辑用户
        function editUser(userId) {
            fetch(`/api/users?page=-1&page_size=1000`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const user = data.data.find(u => u.user_id === userId);
                        if (user) {
                            document.getElementById('userModal').classList.add('active');
                            document.getElementById('modalTitle').textContent = '编辑用户';
                            document.getElementById('userId').value = user.user_id;
                            document.getElementById('userName').value = user.username;
                            document.getElementById('userRole').value = user.role;
                            document.getElementById('userRefId').value = user.ref_id || '';
                            document.getElementById('passwordHint').textContent = '(留空不修改)';
                            document.getElementById('userPassword').value = '';
                        }
                    }
                });
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 提交用户表单
        function handleUserSubmit(event) {
            event.preventDefault();
            const userId = document.getElementById('userId').value;
            const data = {
                username: document.getElementById('userName').value,
                role: document.getElementById('userRole').value,
                ref_id: document.getElementById('userRefId').value
            };
            const password = document.getElementById('userPassword').value;
            if (password) {
                data.password = password;
            }

            const url = userId ? `/api/users/${userId}` : '/api/users';
            const method = userId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) {
                        closeModal('userModal');
                        loadUsers(currentPage);
                    }
                });
        }

        // 删除用户
        function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 "${username}" 吗？`)) return;

            fetch(`/api/users/${userId}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadUsers(currentPage);
                });
        }

        // 编辑权限 - 跳转到独立权限管理页面
        function editPermissions(userId, username) {
            window.location.href = `/user_management/permissions/${userId}`;
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.remove('active');
            }
        }

        // 初始化
        loadUsers();
    </script>

    <script src="/static/js/main.js"></script>
</body>
</html>
