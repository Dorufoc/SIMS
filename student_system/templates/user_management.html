<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'user_management' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>用户管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openCreateModal()">新增用户</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>用户ID</th>
                                    <th>UUID</th>
                                    <th>用户名</th>
                                    <th>角色</th>
                                    <th>关联ID</th>
                                    <th>最后登录</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTable">
                                <tr><td colspan="9" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 创建/编辑用户模态框 -->
    <div id="userModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增用户</h2>
                <button class="close" onclick="closeModal('userModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm" onsubmit="handleUserSubmit(event)">
                    <input type="hidden" id="userId">
                    <div class="form-group">
                        <label>用户名 *</label>
                        <input type="text" id="userName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>密码 <span id="passwordHint">(创建时必填)</span></label>
                        <input type="password" id="userPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>角色 *</label>
                        <select id="userRole" class="form-control" required>
                            <option value="student">学生</option>
                            <option value="teacher">教师</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>关联ID (学号/工号)</label>
                        <input type="text" id="userRefId" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('userModal')">取消</button>
                <button type="button" class="btn btn-primary" onclick="document.getElementById('userForm').dispatchEvent(new Event('submit'))">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        let pager = null;

        // 加载用户列表
        function loadUsers(page = 1) {
            let url = `/api/users?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderUsers(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        // 渲染用户列表
        function renderUsers(users) {
            const tbody = document.getElementById('userTable');
            if (!users || users.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 9;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            users.forEach(function(user, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                const tr = document.createElement('tr');

                const tdIndex = document.createElement('td');
                tdIndex.textContent = rowIdx;
                tr.appendChild(tdIndex);

                const tdId = document.createElement('td');
                tdId.textContent = user.user_id;
                tr.appendChild(tdId);

                const tdUuid = document.createElement('td');
                const code = document.createElement('code');
                code.textContent = user.uuid.substring(0, 20) + '...';
                tdUuid.appendChild(code);
                tr.appendChild(tdUuid);

                const tdUsername = document.createElement('td');
                tdUsername.textContent = user.username;
                tr.appendChild(tdUsername);

                const tdRole = document.createElement('td');
                const roleSpan = document.createElement('span');
                roleSpan.className = 'badge badge-' + user.role;
                if (user.role === 'admin') {
                    roleSpan.textContent = '管理员';
                } else if (user.role === 'teacher') {
                    roleSpan.textContent = '教师';
                } else {
                    roleSpan.textContent = '学生';
                }
                tdRole.appendChild(roleSpan);
                tr.appendChild(tdRole);

                const tdRef = document.createElement('td');
                tdRef.textContent = user.ref_id || '-';
                tr.appendChild(tdRef);

                const tdLastLogin = document.createElement('td');
                tdLastLogin.textContent = user.last_login || '-';
                tr.appendChild(tdLastLogin);

                const tdCreated = document.createElement('td');
                tdCreated.textContent = user.created_at;
                tr.appendChild(tdCreated);

                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-sm btn-primary';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editUser(user.user_id); };
                tdActions.appendChild(btnEdit);

                tdActions.appendChild(document.createTextNode(' '));

                const btnPerm = document.createElement('button');
                btnPerm.className = 'btn btn-success btn-sm';
                btnPerm.textContent = '权限';
                btnPerm.onclick = function() { editPermissions(user.user_id, user.username); };
                tdActions.appendChild(btnPerm);

                tdActions.appendChild(document.createTextNode(' '));

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-danger btn-sm';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteUser(user.user_id, user.username); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadUsers(page); }
        });

        // 打开创建模态框
        function openCreateModal() {
            document.getElementById('userModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增用户';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('passwordHint').textContent = '(创建时必填)';
        }

        // 编辑用户
        function editUser(userId) {
            fetch(`/api/users?page=-1&page_size=1000`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const user = data.data.find(u => u.user_id === userId);
                        if (user) {
                            document.getElementById('userModal').classList.add('active');
                            document.getElementById('modalTitle').textContent = '编辑用户';
                            document.getElementById('userId').value = user.user_id;
                            document.getElementById('userName').value = user.username;
                            document.getElementById('userRole').value = user.role;
                            document.getElementById('userRefId').value = user.ref_id || '';
                            document.getElementById('passwordHint').textContent = '(留空不修改)';
                            document.getElementById('userPassword').value = '';
                        }
                    }
                });
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 提交用户表单
        function handleUserSubmit(event) {
            event.preventDefault();
            const userId = document.getElementById('userId').value;
            const data = {
                username: document.getElementById('userName').value,
                role: document.getElementById('userRole').value,
                ref_id: document.getElementById('userRefId').value
            };
            const password = document.getElementById('userPassword').value;
            if (password) {
                data.password = password;
            }

            const url = userId ? `/api/users/${userId}` : '/api/users';
            const method = userId ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) {
                        closeModal('userModal');
                        loadUsers(pager.currentPage);
                    }
                });
        }

        // 删除用户
        function deleteUser(userId, username) {
            if (!confirm(`确定要删除用户 "${username}" 吗？`)) return;

            fetch(`/api/users/${userId}`, { method: 'DELETE', headers: { 'X-CSRF-Token': _csrf_token } })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadUsers(pager.currentPage);
                });
        }

        // 编辑权限 - 跳转到独立权限管理页面
        function editPermissions(userId, username) {
            window.location.href = `/user_management/permissions/${userId}`;
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal-overlay')) {
                event.target.classList.remove('active');
            }
        }

    </script>

    <script>
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'user_id', label: '用户ID', type: 'number'},
                {name: 'username', label: '用户名', type: 'text'},
                {name: 'role', label: '角色', type: 'select', options: [{value: 'admin', label: '管理员'}, {value: 'teacher', label: '教师'}, {value: 'student', label: '学生'}]},
                {name: 'ref_id', label: '关联ID', type: 'text'},
                {name: 'created_at', label: '创建时间', type: 'text'}
            ],
            onApply: function(filters) { loadUsers(1); },
            onReset: function(filters) { loadUsers(1); }
        });

        initBatchImport({
            entityType: 'user',
            previewColumns: ['用户名', '角色', '关联ID', '真实姓名'],
            requiredFieldIndex: 0,
            requiredFieldName: '用户名',
            onImportSuccess: function() { loadUsers(1); }
        });
        loadUsers();
    </script>

    {% include '_batch_import.html' %}
</body>
</html>
