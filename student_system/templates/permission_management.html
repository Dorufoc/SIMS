<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'permission' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <!-- 页面头部 -->
                    <div class="permission-page-header">
                        <h1>权限管理</h1>
                        <a href="/user_management" class="btn btn-secondary"> 返回用户列表</a>
                    </div>

                    <!-- 用户信息卡片 -->
                    <div class="permission-user-info">
                        <div class="user-avatar" id="user-avatar">U</div>
                    <div class="user-details">
                        <h3 id="user-name">加载中...</h3>
                        <p>
                            角色: <span id="user-role">-</span> |
                            用户ID: <span id="user-id">-</span> |
                            关联ID: <span id="user-ref">无</span>
                        </p>
                    </div>
                    </div>

                    <!-- 权限配置表格 -->
                    <div class="permission-table-container">
                        <div class="table-header">
                            <h3>数据表权限配置</h3>
                            <div class="table-actions">
                                <button class="btn btn-sm btn-secondary" onclick="selectAllPermissions()">全选</button>
                                <button class="btn btn-sm btn-danger" onclick="clearAllPermissions()">清空</button>
                            </div>
                        </div>
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>数据表</th>
                                    <th>读权限</th>
                                    <th>写权限</th>
                                    <th>管理权限</th>
                                    <th>权限码</th>
                                </tr>
                            </thead>
                            <tbody id="permission-tbody">
                                <!-- 权限行将通过JS动态生成 -->
                            </tbody>
                        </table>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="permission-page-actions">
                        <a href="/user_management" class="btn btn-secondary">取消</a>
                        <button class="btn btn-primary" onclick="savePermissions()">保存权限</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 消息提示 -->
    <div id="message-box" class="msg-box" style="display:none;"></div>

    <script>
        // 全局变量
        let allTables = [];
        let currentPermissions = {};
        let userId = null;
        // 从 URL 路径中提取 userId，例如 /user_management/permissions/3
        (function() {
            var m = window.location.pathname.match(/\/permissions\/(\d+)/);
            userId = m ? parseInt(m[1]) : null;
        })();

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (!userId) {
                showMessage('用户ID无效', 'error');
                return;
            }
            loadUserInfo();
            loadTablesAndPermissions();
        });

        // 加载用户基本信息
        function loadUserInfo() {
            fetch('/api/users?page=-1&page_size=1000')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        var user = data.data.find(function(u) { return u.user_id === userId; });
                        if (user) {
                            document.getElementById('user-avatar').textContent = (user.username || 'U').charAt(0).toUpperCase();
                            document.getElementById('user-name').textContent = user.username || '-';
                            document.getElementById('user-role').textContent = user.role || '-';
                            document.getElementById('user-id').textContent = user.user_id || '-';
                            document.getElementById('user-ref').textContent = user.ref_id || '无';
                        }
                    }
                })
                .catch(function(err) {
                    console.error('加载用户信息失败:', err);
                });
        }

        // 加载表列表和权限数据
        function loadTablesAndPermissions() {
            Promise.all([
                fetch('/api/tables').then(res => res.json()),
                fetch(`/api/users/${userId}/permissions`).then(res => res.json())
            ])
            .then(([tablesData, permsData]) => {
                if (tablesData.code === 0) {
                    allTables = tablesData.data;
                }
                if (permsData.code === 0) {
                    // 构建权限映射
                    permsData.data.forEach(p => {
                        currentPermissions[p.table_name] = p.permission_code;
                    });
                }
                renderPermissionTable();
            })
            .catch(err => {
                console.error('加载权限数据失败:', err);
                showMessage('加载权限数据失败', 'error');
            });
        }

        // 渲染权限表格
        function renderPermissionTable() {
            const tbody = document.getElementById('permission-tbody');
            if (!allTables.length) {
                tbody.innerHTML = '<tr><td colspan="5">暂无数据表</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            allTables.forEach(table => {
                const permCode = currentPermissions[table.name] || '000';
                const permNum = parseInt(permCode.substring(0, 1));
                const canRead = (permNum & 4) === 4;
                const canWrite = (permNum & 2) === 2;
                const canAdmin = (permNum & 1) === 1;

                const tr = document.createElement('tr');
                tr.setAttribute('data-table', table.name);

                const tdName = document.createElement('td');
                const strong = document.createElement('strong');
                strong.textContent = table.label;
                tdName.appendChild(strong);
                tdName.appendChild(document.createElement('br'));
                const small = document.createElement('small');
                small.textContent = table.name;
                tdName.appendChild(small);
                tr.appendChild(tdName);

                const tdRead = document.createElement('td');
                const labelRead = document.createElement('label');
                labelRead.className = 'perm-check';
                const inputRead = document.createElement('input');
                inputRead.type = 'checkbox';
                inputRead.className = 'perm-read';
                inputRead.checked = canRead;
                inputRead.onchange = function() { updatePermissionCode(table.name); };
                labelRead.appendChild(inputRead);
                const spanRead = document.createElement('span');
                spanRead.textContent = '读取';
                labelRead.appendChild(spanRead);
                tdRead.appendChild(labelRead);
                tr.appendChild(tdRead);

                const tdWrite = document.createElement('td');
                const labelWrite = document.createElement('label');
                labelWrite.className = 'perm-check';
                const inputWrite = document.createElement('input');
                inputWrite.type = 'checkbox';
                inputWrite.className = 'perm-write';
                inputWrite.checked = canWrite;
                inputWrite.onchange = function() { updatePermissionCode(table.name); };
                labelWrite.appendChild(inputWrite);
                const spanWrite = document.createElement('span');
                spanWrite.textContent = '写入';
                labelWrite.appendChild(spanWrite);
                tdWrite.appendChild(labelWrite);
                tr.appendChild(tdWrite);

                const tdAdmin = document.createElement('td');
                const labelAdmin = document.createElement('label');
                labelAdmin.className = 'perm-check';
                const inputAdmin = document.createElement('input');
                inputAdmin.type = 'checkbox';
                inputAdmin.className = 'perm-admin';
                inputAdmin.checked = canAdmin;
                inputAdmin.onchange = function() { updatePermissionCode(table.name); };
                labelAdmin.appendChild(inputAdmin);
                const spanAdmin = document.createElement('span');
                spanAdmin.textContent = '管理';
                labelAdmin.appendChild(spanAdmin);
                tdAdmin.appendChild(labelAdmin);
                tr.appendChild(tdAdmin);

                const tdCode = document.createElement('td');
                const codeEl = document.createElement('code');
                codeEl.className = 'perm-code';
                codeEl.id = 'code-' + table.name;
                codeEl.textContent = permCode;
                tdCode.appendChild(codeEl);
                tr.appendChild(tdCode);

                tbody.appendChild(tr);
            });
        }

        // 更新权限码显示
        function updatePermissionCode(tableName) {
            const row = document.querySelector(`tr[data-table="${tableName}"]`);
            if (!row) return;

            const canRead = row.querySelector('.perm-read').checked;
            const canWrite = row.querySelector('.perm-write').checked;
            const canAdmin = row.querySelector('.perm-admin').checked;

            let perm = 0;
            if (canRead) perm |= 4;
            if (canWrite) perm |= 2;
            if (canAdmin) perm |= 1;

            const permCode = perm + '00';
            document.getElementById(`code-${tableName}`).textContent = permCode;
        }

        // 全选权限
        function selectAllPermissions() {
            allTables.forEach(table => {
                const row = document.querySelector(`tr[data-table="${table.name}"]`);
                if (row) {
                    row.querySelector('.perm-read').checked = true;
                    row.querySelector('.perm-write').checked = true;
                    row.querySelector('.perm-admin').checked = true;
                    updatePermissionCode(table.name);
                }
            });
            showMessage('已全选所有权限', 'success');
        }

        // 清空权限
        function clearAllPermissions() {
            if (!confirm('确定要清空所有权限吗？')) return;

            allTables.forEach(table => {
                const row = document.querySelector(`tr[data-table="${table.name}"]`);
                if (row) {
                    row.querySelector('.perm-read').checked = false;
                    row.querySelector('.perm-write').checked = false;
                    row.querySelector('.perm-admin').checked = false;
                    updatePermissionCode(table.name);
                }
            });
            showMessage('已清空所有权限', 'success');
        }

        // 保存权限
        function savePermissions() {
            const permissions = allTables.map(table => {
                const row = document.querySelector(`tr[data-table="${table.name}"]`);
                let perm = 0;
                if (row) {
                    if (row.querySelector('.perm-read').checked) perm |= 4;
                    if (row.querySelector('.perm-write').checked) perm |= 2;
                    if (row.querySelector('.perm-admin').checked) perm |= 1;
                }
                return {
                    table_name: table.name,
                    permission_code: perm + '00'
                };
            });

            fetch(`/api/users/${userId}/permissions`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify({ permissions })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    showMessage('权限保存成功', 'success');
                    setTimeout(() => {
                        window.location.href = '/user_management';
                    }, 1000);
                } else {
                    showMessage(data.msg || '保存失败', 'error');
                }
            })
            .catch(err => {
                console.error('保存权限失败:', err);
                showMessage('保存权限失败', 'error');
            });
        }

        // 显示消息
        function showMessage(message, type) {
            const box = document.getElementById('message-box');
            box.textContent = message;
            box.className = `msg-box msg-${type}`;
            box.style.display = 'block';

            setTimeout(() => {
                box.style.display = 'none';
            }, 3000);
        }
    </script>

    <script src="/static/js/main.js"></script>
</body>
</html>
