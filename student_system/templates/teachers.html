<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'teachers' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>教师管理</h1>
                        <button class="btn btn-primary" onclick="openModal()">新增教师</button>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>工号</th>
                                    <th>姓名</th>
                                    <th>性别</th>
                                    <th>所属院系</th>
                                    <th>职称</th>
                                    <th>联系电话</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="teacherTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="teacherModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增教师</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="teacherForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="teacherId">
                <div class="form-group">
                    <label>工号 *</label>
                    <input type="text" id="teacherIdInput" required placeholder="如：T2024001">
                </div>
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="M">男</option>
                        <option value="F">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>所属院系 *</label>
                    <select id="deptId" required>
                        <option value="">请选择院系</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>职称</label>
                    <select id="title">
                        <option value="">请选择</option>
                        <option value="教授">教授</option>
                        <option value="副教授">副教授</option>
                        <option value="讲师">讲师</option>
                        <option value="助教">助教</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" id="phone">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let departments = [];

        // 加载院系列表
        function loadDepartments() {
            fetch('/api/departments?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        departments = data.data;
                        const deptSelect = document.getElementById('deptId');
                        const options = departments.map(d => `<option value="${d.dept_id}">${d.dept_name}</option>`).join('');
                        deptSelect.innerHTML = '<option value="">请选择院系</option>' + options;
                    }
                });
        }

        // 加载教师列表
        function loadTeachers(page = 1) {
            currentPage = page;
            let url = `/api/teachers?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('teacherTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(teacher => {
                const dept = departments.find(d => d.dept_id === teacher.dept_id);
                return `
                    <tr>
                        <td>${teacher.teacher_id}</td>
                        <td>${teacher.name}</td>
                        <td>${teacher.gender === 'M' ? '男' : teacher.gender === 'F' ? '女' : teacher.gender || '-'}</td>
                        <td>${dept ? dept.dept_name : '-'}</td>
                        <td>${teacher.title || '-'}</td>
                        <td>${teacher.phone || '-'}</td>
                        <td class="actions">
                            <button class="btn btn-warning" onclick="editTeacher('${teacher.teacher_id}')">编辑</button>
                            <button class="btn btn-danger" onclick="deleteTeacher('${teacher.teacher_id}', '${teacher.name}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="loadTeachers(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadTeachers(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadTeachers(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        // 打开模态框
        function openModal() {
            document.getElementById('teacherModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增教师';
            document.getElementById('teacherForm').reset();
            document.getElementById('teacherId').value = '';
            document.getElementById('teacherIdInput').disabled = false;
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('teacherModal').classList.remove('active');
        }

        // 编辑教师
        function editTeacher(id) {
            fetch(`/api/teachers/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const teacher = data.data;
                        document.getElementById('teacherModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑教师';
                        document.getElementById('teacherId').value = teacher.teacher_id;
                        document.getElementById('teacherIdInput').value = teacher.teacher_id;
                        document.getElementById('teacherIdInput').disabled = true;
                        document.getElementById('name').value = teacher.name;
                        document.getElementById('gender').value = teacher.gender || 'M';
                        document.getElementById('deptId').value = teacher.dept_id;
                        document.getElementById('title').value = teacher.title || '';
                        document.getElementById('phone').value = teacher.phone || '';
                        document.getElementById('email').value = teacher.email || '';
                    }
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('teacherId').value;
            const data = {
                teacher_id: document.getElementById('teacherIdInput').value,
                name: document.getElementById('name').value,
                gender: document.getElementById('gender').value,
                dept_id: parseInt(document.getElementById('deptId').value),
                title: document.getElementById('title').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            };

            const url = id ? `/api/teachers/${id}` : '/api/teachers';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadTeachers(currentPage);
                }
            });
        }

        // 删除教师
        function deleteTeacher(id, name) {
            if (!confirm(`确定要删除教师 "${name}" 吗？`)) return;

            fetch(`/api/teachers/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadTeachers(currentPage);
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'teacher_id', label: '工号', type: 'text'},
                {name: 'name', label: '姓名', type: 'text'},
                {name: 'gender', label: '性别', type: 'select', options: ['M', 'F']},
                {name: 'dept_name', label: '所属院系', type: 'text'},
                {name: 'title', label: '职称', type: 'select', options: ['教授', '副教授', '讲师', '助教']},
                {name: 'phone', label: '联系电话', type: 'text'}
            ],
            onApply: function(filters) { loadTeachers(1); },
            onReset: function(filters) { loadTeachers(1); }
        });
        loadDepartments();
        loadTeachers();
    </script>

</body>
</html>
