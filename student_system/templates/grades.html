<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'grades' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>成绩管理</h1>
                        <div class="header-actions">
                            <button class="btn btn-secondary" onclick="openBatchImportModal()" style="text-decoration:none;">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openAddGradeModal()">新增成绩</button>
                        </div>
                    </div>

                    <!-- 新增成绩模态框 -->
                    <div id="gradeModal" class="modal-overlay">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h2 id="modalTitle">新增成绩</h2>
                                <span class="close" onclick="closeAddGradeModal()">&times;</span>
                            </div>
                            <form id="gradeForm" onsubmit="handleGradeSubmit(event)">
                                <input type="hidden" id="gradeId">
                                <div class="form-group">
                                    <label>学号 *</label>
                                    <input type="text" id="gradeStudentId" required placeholder="请输入学号" oninput="loadEnrolledCourses(this.value)">
                                </div>
                                <div class="form-group">
                                    <label>课程 *</label>
                                    <select id="gradeCourseId" required>
                                        <option value="">请选择课程</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>成绩 *</label>
                                    <input type="number" id="gradeScore" step="0.5" min="0" max="100" required placeholder="0-100">
                                </div>
                                <button type="submit" class="btn btn-primary">保存</button>
                            </form>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th data-sort="student_id">学号</th>
                                    <th data-sort="student_name">姓名</th>
                                    <th data-sort="course_name">课程</th>
                                    <th data-sort="credits">学分</th>
                                    <th data-sort="score">成绩</th>
                                    <th data-sort="semester_name">学期</th>
                                    <th data-sort="status">状态</th>
                                </tr>
                            </thead>
                            <tbody id="gradeTable">
                                <tr><td colspan="8" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        let pager = null;

        // 根据学号加载学生已选课程
        function loadEnrolledCourses(studentId) {
            const select = document.getElementById('gradeCourseId');
            if (!studentId) {
                select.innerHTML = '<option value="">请先输入学号</option>';
                return;
            }
            select.innerHTML = '<option value="">加载中...</option>';
            fetch(`/api/students/${encodeURIComponent(studentId)}/enrolled-courses`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0 && data.data && data.data.length > 0) {
                        select.innerHTML = '<option value="">请选择课程</option>' +
                            data.data.map(c => `<option value="${c.course_id}">${c.course_name} (${c.course_id})</option>`).join('');
                    } else {
                        select.innerHTML = '<option value="">该学生暂无已选课程</option>';
                    }
                })
                .catch(() => {
                    select.innerHTML = '<option value="">加载失败，请重试</option>';
                });
        }

        // 打开新增成绩模态框
        function openAddGradeModal() {
            document.getElementById('gradeModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增成绩';
            document.getElementById('gradeForm').reset();
            document.getElementById('gradeId').value = '';
            document.getElementById('gradeCourseId').innerHTML = '<option value="">请先输入学号</option>';
        }

        function closeAddGradeModal() {
            document.getElementById('gradeModal').classList.remove('active');
        }

        // 提交新增成绩
        function handleGradeSubmit(e) {
            e.preventDefault();
            const data = {
                student_id: document.getElementById('gradeStudentId').value.trim(),
                course_id: document.getElementById('gradeCourseId').value,
                score: parseFloat(document.getElementById('gradeScore').value)
            };

            fetch('/api/grades/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeAddGradeModal();
                    loadGrades(pager.currentPage);
                }
            });
        }

        function loadGrades(page = 1) {
            let url = `/api/grades?page=${page}&page_size=10`;
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        function renderTable(data) {
            const tbody = document.getElementById('gradeTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                const emptyTr = document.createElement('tr');
                const emptyTd = document.createElement('td');
                emptyTd.colSpan = 8;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(g, i) {
                const tr = document.createElement('tr');
                const rowIdx = (pager.currentPage - 1) * 10 + i + 1;

                const tdIndex = document.createElement('td');
                tdIndex.textContent = rowIdx;
                tr.appendChild(tdIndex);

                const tdStudentId = document.createElement('td');
                tdStudentId.textContent = g.student_id;
                tr.appendChild(tdStudentId);

                const tdName = document.createElement('td');
                tdName.textContent = g.student_name || '-';
                tr.appendChild(tdName);

                const tdCourse = document.createElement('td');
                tdCourse.textContent = g.course_name || '-';
                tr.appendChild(tdCourse);

                const tdCredits = document.createElement('td');
                tdCredits.textContent = g.credits || '-';
                tr.appendChild(tdCredits);

                const tdScore = document.createElement('td');
                const scoreSpan = document.createElement('span');
                scoreSpan.className = 'score-display';
                scoreSpan.textContent = g.score !== null && g.score !== undefined ? g.score : '-';
                tdScore.appendChild(scoreSpan);
                tr.appendChild(tdScore);

                const tdSemester = document.createElement('td');
                tdSemester.textContent = g.semester_name || '-';
                tr.appendChild(tdSemester);

                const tdStatus = document.createElement('td');
                tdStatus.textContent = g.status || '-';
                tr.appendChild(tdStatus);

                tbody.appendChild(tr);
            });
        }

        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'student_id', label: '学号', type: 'text'},
                {name: 'student_name', label: '姓名', type: 'text'},
                {name: 'course_name', label: '课程', type: 'text'},
                {name: 'score', label: '成绩', type: 'number'},
                {name: 'status', label: '状态', type: 'select', options: ['正常', '退课', '缺考', '违纪']}
            ],
            onApply: function(filters) { loadGrades(1); },
            onReset: function(filters) { loadGrades(1); }
        });
        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadGrades(page); }
        });
        loadGrades();

        initBatchImport({
            entityType: 'grade',
            previewColumns: ['学号', '课程编号', '成绩'],
            requiredFieldIndex: 0,
            requiredFieldName: '学号',
            onImportSuccess: function() { loadGrades(1); }
        });
    </script>
</body>
</html>
