<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'majors' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>专业管理</h1>
                        <button class="btn btn-primary" onclick="openModal()">新增专业</button>
                    </div>

                    <div class="search-box">
                        <select id="deptFilter" onchange="handleSearch()">
                            <option value="">所有院系</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="搜索专业名称..." onkeyup="handleSearch()">
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>专业编号</th>
                                    <th>专业名称</th>
                                    <th>所属院系</th>
                                    <th>学制(年)</th>
                                    <th>学位类型</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="majorTable">
                                <!-- 数据将通过JS加载 -->
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="majorModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增专业</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="majorForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="majorId">
                <div class="form-group">
                    <label>所属院系 *</label>
                    <select id="deptId" required>
                        <option value="">请选择院系</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>专业名称 *</label>
                    <input type="text" id="majorName" required>
                </div>
                <div class="form-group">
                    <label>学制(年) *</label>
                    <input type="number" id="duration" value="4" min="1" max="8" required>
                </div>
                <div class="form-group">
                    <label>学位类型</label>
                    <select id="degreeType">
                        <option value="学士">学士</option>
                        <option value="硕士">硕士</option>
                        <option value="博士">博士</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>专业简介</label>
                    <input type="text" id="description">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let searchKeyword = '';
        let deptFilter = '';
        let departments = [];

        // 加载院系列表
        function loadDepartments() {
            fetch('/api/departments?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        departments = data.data;
                        const deptSelect = document.getElementById('deptId');
                        const deptFilter = document.getElementById('deptFilter');
                        const options = departments.map(d => `<option value="${d.dept_id}">${d.dept_name}</option>`).join('');
                        deptSelect.innerHTML = '<option value="">请选择院系</option>' + options;
                        deptFilter.innerHTML = '<option value="">所有院系</option>' + options;
                    }
                });
        }

        // 加载专业列表
        function loadMajors(page = 1) {
            currentPage = page;
            let url = `/api/majors?page=${page}&page_size=10`;
            if (searchKeyword) url += `&keyword=${encodeURIComponent(searchKeyword)}`;
            if (deptFilter) url += `&dept_id=${deptFilter}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        totalPages = data.total_pages || 1;
                        renderPagination();
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('majorTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(major => {
                const dept = departments.find(d => d.dept_id === major.dept_id);
                return `
                    <tr>
                        <td>${major.major_id}</td>
                        <td>${major.major_name}</td>
                        <td>${dept ? dept.dept_name : '-'}</td>
                        <td>${major.duration}</td>
                        <td>${major.degree_type || '-'}</td>
                        <td class="actions">
                            <button class="btn btn-warning" onclick="editMajor(${major.major_id})">编辑</button>
                            <button class="btn btn-danger" onclick="deleteMajor(${major.major_id}, '${major.major_name}')">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 渲染分页
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            let html = `<button class="page-btn" onclick="loadMajors(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadMajors(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button class="page-btn" onclick="loadMajors(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
            pagination.innerHTML = html;
        }

        // 搜索处理
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value;
            deptFilter = document.getElementById('deptFilter').value;
            loadMajors(1);
        }

        // 打开模态框
        function openModal() {
            document.getElementById('majorModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增专业';
            document.getElementById('majorForm').reset();
            document.getElementById('majorId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('majorModal').classList.remove('active');
        }

        // 编辑专业
        function editMajor(id) {
            fetch(`/api/majors/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const major = data.data;
                        document.getElementById('majorModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑专业';
                        document.getElementById('majorId').value = major.major_id;
                        document.getElementById('deptId').value = major.dept_id;
                        document.getElementById('majorName').value = major.major_name;
                        document.getElementById('duration').value = major.duration;
                        document.getElementById('degreeType').value = major.degree_type || '学士';
                        document.getElementById('description').value = major.description || '';
                    }
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('majorId').value;
            const data = {
                dept_id: parseInt(document.getElementById('deptId').value),
                major_name: document.getElementById('majorName').value,
                duration: parseInt(document.getElementById('duration').value),
                degree_type: document.getElementById('degreeType').value,
                description: document.getElementById('description').value
            };

            const url = id ? `/api/majors/${id}` : '/api/majors';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadMajors(currentPage);
                }
            });
        }

        // 删除专业
        function deleteMajor(id, name) {
            if (!confirm(`确定要删除专业 "${name}" 吗？`)) return;

            fetch(`/api/majors/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadMajors(currentPage);
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }

        // 初始化
        loadDepartments();
        loadMajors();
    </script>

    <script src="/static/js/main.js"></script>
</body>
</html>
