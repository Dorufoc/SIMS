<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业管理 - 学生信息管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    {% set active_page = 'majors' %}
    {% include '_header.html' %}

    <div class="layout-wrapper">
        {% include '_sidebar.html' %}
        <main class="main-wrapper" id="main-wrapper">
            <div class="content-area">
                <div class="permission-page">
                    <div class="permission-page-header">
                        <h1>专业管理</h1>
                        <div>
                            <button class="btn btn-secondary" onclick="openBatchImportModal()">批量导入/导出</button>
                            <button class="btn btn-primary" onclick="openModal()">新增专业</button>
                        </div>
                    </div>

                    <div id="filterModule" class="filter-builder">
                        <div class="filter-builder-header">
                            <h3>筛选条件</h3>
                            <button class="btn btn-sm btn-primary btn-add-filter">+ 添加筛选条件</button>
                        </div>
                        <div class="filter-rows-container">
                            <div class="filter-empty-hint">暂无筛选条件，点击上方"添加筛选条件"按钮添加</div>
                        </div>
                        <div class="filter-actions" style="margin-top:15px;margin-bottom:0;">
                            <button class="btn btn-primary btn-apply-filters">查询</button>
                            <button class="btn btn-secondary btn-reset-filters">重置</button>
                        </div>
                    </div>

                    <div class="permission-table-container">
                        <table class="permission-table">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th data-sort="major_id">专业编号</th>
                                    <th data-sort="major_name">专业名称</th>
                                    <th data-sort="dept_name">所属院系</th>
                                    <th data-sort="duration">学制(年)</th>
                                    <th data-sort="degree_type">学位类型</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="majorTable">
                                <tr><td colspan="7" class="empty-row">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="majorModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增专业</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="majorForm" onsubmit="handleSubmit(event)">
                <input type="hidden" id="majorId">
                <div class="form-group">
                    <label>所属院系 *</label>
                    <select id="deptId" required>
                        <option value="">请选择院系</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>专业名称 *</label>
                    <input type="text" id="majorName" required>
                </div>
                <div class="form-group">
                    <label>学制(年) *</label>
                    <input type="number" id="duration" value="4" min="1" max="8" required>
                </div>
                <div class="form-group">
                    <label>学位类型</label>
                    <select id="degreeType">
                        <option value="学士">学士</option>
                        <option value="硕士">硕士</option>
                        <option value="博士">博士</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>专业简介</label>
                    <input type="text" id="description">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    {% include '_batch_import.html' %}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/pagination.js"></script>
    <script>
        let departments = [];
        var currentSort = { sort_by: '', sort_order: 'asc' };

        // 加载院系列表
        function loadDepartments() {
            fetch('/api/departments?page=-1')
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        departments = data.data;
                        const deptSelect = document.getElementById('deptId');
                        const options = departments.map(d => `<option value="${d.dept_id}">${d.dept_name}</option>`).join('');
                        deptSelect.innerHTML = '<option value="">请选择院系</option>' + options;
                    }
                });
        }

        // 加载专业列表
        function loadMajors(page = 1) {
            let url = `/api/majors?page=${page}&page_size=10`;
            if (currentSort.sort_by) {
                url += '&sort_by=' + encodeURIComponent(currentSort.sort_by) + '&sort_order=' + encodeURIComponent(currentSort.sort_order);
            }
            const filters = collectFilterValues('filterModule');
            if (filters.length > 0) {
                url += '&' + encodeFilters(filters);
            }

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        renderTable(data.data);
                        pager.update({ currentPage: page, totalPages: data.total_pages || 1 });
                    }
                });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('majorTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                var emptyTr = document.createElement('tr');
                var emptyTd = document.createElement('td');
                emptyTd.colSpan = 7;
                emptyTd.className = 'empty-row';
                emptyTd.textContent = '暂无数据';
                emptyTr.appendChild(emptyTd);
                tbody.appendChild(emptyTr);
                return;
            }

            tbody.innerHTML = '';
            data.forEach(function(major, i) {
                var rowIdx = (pager.currentPage - 1) * 10 + i + 1;
                const tr = document.createElement('tr');

                var cells = [rowIdx, major.major_id, major.major_name, major.dept_name || '-', major.duration, major.degree_type || '-'];
                for (var ci = 0; ci < cells.length; ci++) {
                    var td = document.createElement('td');
                    td.textContent = String(cells[ci]);
                    tr.appendChild(td);
                }

                const tdActions = document.createElement('td');
                tdActions.className = 'action-cell';

                const btnEdit = document.createElement('button');
                btnEdit.className = 'btn btn-sm btn-primary';
                btnEdit.textContent = '编辑';
                btnEdit.onclick = function() { editMajor(major.major_id); };
                tdActions.appendChild(btnEdit);

                tdActions.appendChild(document.createTextNode(' '));

                const btnDelete = document.createElement('button');
                btnDelete.className = 'btn btn-sm btn-danger';
                btnDelete.textContent = '删除';
                btnDelete.onclick = function() { deleteMajor(major.major_id, major.major_name); };
                tdActions.appendChild(btnDelete);

                tr.appendChild(tdActions);
                tbody.appendChild(tr);
            });
        }

        // 初始化分页
        pager = new Pagination({
            container: 'pagination',
            totalPages: 1,
            currentPage: 1,
            range: 2,
            onChange: function (page) { loadMajors(page); }
        });

        // 打开模态框
        function openModal() {
            document.getElementById('majorModal').classList.add('active');
            document.getElementById('modalTitle').textContent = '新增专业';
            document.getElementById('majorForm').reset();
            document.getElementById('majorId').value = '';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('majorModal').classList.remove('active');
        }

        // 编辑专业
        function editMajor(id) {
            fetch(`/api/majors/${id}`)
                .then(res => res.json())
                .then(data => {
                    if (data.code === 0) {
                        const major = data.data;
                        document.getElementById('majorModal').classList.add('active');
                        document.getElementById('modalTitle').textContent = '编辑专业';
                        document.getElementById('majorId').value = major.major_id;
                        document.getElementById('deptId').value = major.dept_id;
                        document.getElementById('majorName').value = major.major_name;
                        document.getElementById('duration').value = major.duration;
                        document.getElementById('degreeType').value = major.degree_type || '学士';
                        document.getElementById('description').value = major.description || '';
                    }
                });
        }

        // 提交表单
        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('majorId').value;
            const data = {
                dept_id: parseInt(document.getElementById('deptId').value),
                major_name: document.getElementById('majorName').value,
                duration: parseInt(document.getElementById('duration').value),
                degree_type: document.getElementById('degreeType').value,
                description: document.getElementById('description').value
            };

            const url = id ? `/api/majors/${id}` : '/api/majors';
            const method = id ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': _csrf_token },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.msg);
                if (data.code === 0) {
                    closeModal();
                    loadMajors(pager.currentPage);
                }
            });
        }

        // 删除专业
        function deleteMajor(id, name) {
            if (!confirm(`确定要删除专业 "${name}" 吗？`)) return;

            fetch(`/api/majors/${id}`, { method: 'DELETE', headers: { 'X-CSRF-Token': _csrf_token } })
                .then(res => res.json())
                .then(data => {
                    alert(data.msg);
                    if (data.code === 0) loadMajors(pager.currentPage);
                });
        }

        window.onclick = function(e) {
            if (e.target.classList.contains('modal-overlay')) closeModal();
        }

        // 初始化筛选模块和加载数据
        initFilterModule({
            containerId: 'filterModule',
            fields: [
                {name: 'major_id', label: '专业编号', type: 'number'},
                {name: 'major_name', label: '专业名称', type: 'text'},
                {name: 'dept_name', label: '所属院系', type: 'text'},
                {name: 'duration', label: '学制(年)', type: 'number'},
                {name: 'degree_type', label: '学位类型', type: 'text'}
            ],
            onApply: function(filters) { loadMajors(1); },
            onReset: function(filters) { loadMajors(1); }
        });
        loadDepartments();
        loadMajors();

        initSortableTable({
            tableId: 'majorTable',
            onSort: function(sort) {
                currentSort = sort;
                loadMajors(1);
            }
        });

        initBatchImport({
            entityType: 'major',
            previewColumns: ['专业名称', '所属院系编号', '学制(年)'],
            requiredFieldIndex: 0,
            requiredFieldName: '专业名称',
            onImportSuccess: function() { loadMajors(1); }
        });
    </script>
</body>
</html>
